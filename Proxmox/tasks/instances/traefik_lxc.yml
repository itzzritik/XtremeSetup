- vars:
      id: '{{ env.JARVIS_SERVICES.traefik.id }}'
      instance:
          hostname: traefik
          memory: 2048
          swap: 512
          cores: 2
          storage: local-lvm
          ip: '{{ env.JARVIS_NETWORK_PREFIX }}.{{ id }}'
          gateway: '{{ env.JARVIS_GATEWAY }}'
          mac: '{{ env.JARVIS_MAC_PREFIX }}:{{ "%02x" | format(id | int) }}'
          subuid: '100000'
      paths:
          config: '{{ env.JARVIS_CONFIGS_DIR }}/{{ instance.hostname }}'
          cloudflared_config: '{{ env.JARVIS_CONFIGS_DIR }}/{{ instance.hostname }}/cloudflared'
  block:
      # ── Step 1: Health Check ────────────────────────────────────────────
      - name: '{{ instance.hostname | upper }}: Health Check'
        include_tasks: ../utils/_health_check.yml
        vars:
            health:
                id: '{{ id }}'
                type: lxc
                url: 'http://{{ instance.ip }}:8080'
                timeout: 5

      # ── Step 2: Provision ───────────────────────────────────────────────
      - name: '{{ instance.hostname | upper }}: Create Config Directories on Host'
        file:
            path: '{{ dir_item }}'
            state: directory
            mode: '0777'
            owner: '{{ instance.subuid }}'
            group: '{{ instance.subuid }}'
            recurse: true
        loop:
            - '{{ paths.config }}'
            - '{{ paths.config }}/dynamic'
            - '{{ paths.cloudflared_config }}'
        loop_control:
            loop_var: dir_item

      - name: '{{ instance.hostname | upper }}: Provision Instance'
        when: needs_provision | bool
        block:
            - name: '{{ instance.hostname | upper }}: Create LXC'
              include_tasks: ../utils/_create_lxc.yml
              vars:
                  lxc:
                      id: '{{ id }}'
                      hostname: '{{ instance.hostname }}'
                      cores: '{{ instance.cores }}'
                      memory: '{{ instance.memory }}'
                      swap: '{{ instance.swap }}'
                      disk: 8
                      storage: '{{ instance.storage }}'
                      unprivileged: true
                      ip: '{{ instance.ip }}'
                      gateway: '{{ instance.gateway }}'
                      mac: '{{ instance.mac }}'
                      mounts:
                          - src: '{{ paths.config }}'
                            dest: /etc/traefik
                          - src: '{{ paths.cloudflared_config }}'
                            dest: /etc/cloudflared

            - name: '{{ instance.hostname | upper }}: Get latest Traefik version'
              uri:
                  url: https://api.github.com/repos/traefik/traefik/releases/latest
                  return_content: true
              register: traefik_release

            - name: '{{ instance.hostname | upper }}: Set Traefik version fact'
              set_fact:
                  traefik_version: '{{ traefik_release.json.tag_name | regex_replace("^v", "") }}'

            - name: '{{ instance.hostname | upper }}: Download Traefik binary'
              get_url:
                  url: 'https://github.com/traefik/traefik/releases/download/v{{ traefik_version }}/traefik_v{{ traefik_version }}_linux_amd64.tar.gz'
                  dest: '/tmp/traefik_{{ traefik_version }}.tar.gz'
                  mode: '0644'

            - name: '{{ instance.hostname | upper }}: Push tarball to container'
              command: pct push {{ id }} /tmp/traefik_{{ traefik_version }}.tar.gz /tmp/traefik.tar.gz

            - name: '{{ instance.hostname | upper }}: Extract Traefik binary'
              shell: |
                  pct exec {{ id }} -- bash -c '
                  tar -xzf /tmp/traefik.tar.gz -C /usr/local/bin traefik
                  chmod +x /usr/local/bin/traefik
                  rm -f /tmp/traefik.tar.gz
                  '

            - name: '{{ instance.hostname | upper }}: Cleanup host tarball'
              file:
                  path: '/tmp/traefik_{{ traefik_version }}.tar.gz'
                  state: absent

            - name: '{{ instance.hostname | upper }}: Create Traefik systemd service'
              shell: |
                  pct exec {{ id }} -- bash -c 'cat > /etc/systemd/system/traefik.service << EOF
                  [Unit]
                  Description=Traefik
                  Documentation=https://doc.traefik.io/traefik/
                  After=network-online.target
                  Wants=network-online.target

                  [Service]
                  Type=notify
                  EnvironmentFile=-/etc/traefik/.env
                  ExecStart=/usr/local/bin/traefik --configFile=/etc/traefik/traefik.yml
                  Restart=on-failure
                  RestartSec=5

                  [Install]
                  WantedBy=multi-user.target
                  EOF
                  systemctl daemon-reload
                  systemctl enable traefik
                  '

            - name: '{{ instance.hostname | upper }}: Download Cloudflared deb'
              get_url:
                  url: https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
                  dest: '/tmp/cloudflared-linux-amd64.deb'
                  mode: '0644'

            - name: '{{ instance.hostname | upper }}: Push Cloudflared deb to container'
              command: pct push {{ id }} /tmp/cloudflared-linux-amd64.deb /tmp/cloudflared-linux-amd64.deb

            - name: '{{ instance.hostname | upper }}: Install Cloudflared'
              shell: |
                  pct exec {{ id }} -- bash -c 'dpkg -i /tmp/cloudflared-linux-amd64.deb && rm -f /tmp/cloudflared-linux-amd64.deb'

            - name: '{{ instance.hostname | upper }}: Cleanup host deb'
              file:
                  path: '/tmp/cloudflared-linux-amd64.deb'
                  state: absent

            - name: '{{ instance.hostname | upper }}: Configure Cloudflared Service'
              shell: |
                  pct exec {{ id }} -- bash -c "cloudflared service uninstall || true"
                  pct exec {{ id }} -- bash -c "cloudflared service install {{ env.JARVIS_CF_TUNNEL_TOKEN }}"
              when: env.JARVIS_CF_TUNNEL_TOKEN is defined and env.JARVIS_CF_TUNNEL_TOKEN | length > 0
              no_log: true

      # ── Step 3: Config (always runs) ───────────────────────────────────
      - name: '{{ instance.hostname | upper }}: Configure service'
        block:
            - name: '{{ instance.hostname | upper }}: Ensure acme.json exists'
              file:
                  path: '{{ paths.config }}/acme.json'
                  state: touch
                  access_time: preserve
                  modification_time: preserve
                  mode: '0600'
                  owner: '{{ instance.subuid }}'
                  group: '{{ instance.subuid }}'

            - name: '{{ instance.hostname | upper }}: Update static config'
              copy:
                  dest: '{{ paths.config }}/traefik.yml'
                  content: |
                      global:
                        checkNewVersion: true
                        sendAnonymousUsage: false

                      log:
                        level: INFO

                      api:
                        dashboard: true
                        insecure: true

                      entryPoints:
                        web:
                          address: ":80"
                          http:
                            redirections:
                              entryPoint:
                                to: websecure
                                scheme: https
                        websecure:
                          address: ":443"
                          http:
                            tls:
                              certResolver: letsencrypt

                      providers:
                        file:
                          directory: /etc/traefik/dynamic
                          watch: true

                      certificatesResolvers:
                        letsencrypt:
                          acme:
                            email: "{{ env.RITIK_EMAIL }}"
                            storage: /etc/traefik/acme.json
                            dnsChallenge:
                              provider: cloudflare
                              resolvers:
                                - "1.1.1.1:53"
                                - "8.8.8.8:53"
                  owner: '{{ instance.subuid }}'
                  group: '{{ instance.subuid }}'
                  mode: '0666'
              register: static_config

            - name: '{{ instance.hostname | upper }}: Update dynamic rules'
              copy:
                  dest: '{{ paths.config }}/dynamic/rules.yml'
                  content: |
                      http:
                        serversTransports:
                          insecureTransport:
                            insecureSkipVerify: true

                        middlewares:
                          auth:
                            forwardAuth:
                              address: "http://{{ env.JARVIS_NETWORK_PREFIX }}.{{ env.JARVIS_SERVICES.voidauth.id }}:{{ env.JARVIS_SERVICES.voidauth.port }}/api/authz/forward-auth"
                              trustForwardHeader: true
                              authResponseHeaders:
                                - Remote-User
                                - Remote-Name
                                - Remote-Email
                                - Remote-Groups

                          pihole-redirect:
                            redirectRegex:
                              regex: "^https?://pihole\\.{{ env.JARVIS_DOMAIN | replace('.', '\\.') }}/?$"
                              replacement: "https://pihole.{{ env.JARVIS_DOMAIN }}/admin/"

                        routers:
                      {% for svc_key, svc in env.JARVIS_SERVICES.items() %}
                      {% if svc.subdomains is defined or svc.root_domain | default(false) %}
                          {{ svc_key }}:
                            rule: "{% if svc.root_domain | default(false) %}Host(`{{ env.JARVIS_DOMAIN }}`){% else %}{% for subdomain in svc.subdomains %}Host(`{{ subdomain }}.{{ env.JARVIS_DOMAIN }}`){% if not loop.last %} || {% endif %}{% endfor %}{% endif %}"
                            service: "{{ 'api@internal' if svc.is_internal | default(false) else svc_key }}"
                      {% set all_middlewares = [] %}
                      {% if not svc.skip_auth | default(false) %}
                      {% set _ = all_middlewares.append('auth') %}
                      {% endif %}
                      {% for mw in svc.middlewares | default([]) %}
                      {% set _ = all_middlewares.append(mw) %}
                      {% endfor %}
                      {% if all_middlewares | length > 0 %}
                            middlewares:
                      {% for mw in all_middlewares %}
                              - "{{ mw }}"
                      {% endfor %}
                      {% endif %}
                      {% endif %}
                      {% endfor %}

                        services:
                      {% for svc_key, svc in env.JARVIS_SERVICES.items() %}
                      {% if (svc.subdomains is defined or svc.root_domain | default(false)) and not svc.is_internal | default(false) %}
                          {{ svc_key }}:
                            loadBalancer:
                              servers:
                                - url: "{{ 'https' if svc.https | default(false) else 'http' }}://{{ env.JARVIS_NETWORK_PREFIX }}.{{ svc.id }}:{{ svc.port }}"
                      {% if svc.insecure | default(false) %}
                              serversTransport: "insecureTransport"
                      {% endif %}
                      {% endif %}
                      {% endfor %}
                  owner: '{{ instance.subuid }}'
                  group: '{{ instance.subuid }}'
                  mode: '0666'
              register: dynamic_config

            - name: '{{ instance.hostname | upper }}: Write .env with CF_DNS_API_TOKEN'
              copy:
                  dest: '{{ paths.config }}/.env'
                  content: |
                      CF_DNS_API_TOKEN={{ env.JARVIS_CF_DNS_API_TOKEN }}
                  owner: '{{ instance.subuid }}'
                  group: '{{ instance.subuid }}'
                  mode: '0600'
              register: env_file
              no_log: true

            - name: '{{ instance.hostname | upper }}: Restart Traefik'
              shell: pct exec {{ id }} -- bash -c "systemctl daemon-reload && systemctl restart traefik"
              when: static_config.changed or dynamic_config.changed or env_file.changed

            - name: '{{ instance.hostname | upper }}: Write tunnel token marker'
              copy:
                  dest: '{{ paths.cloudflared_config }}/.tunnel_token'
                  content: '{{ env.JARVIS_CF_TUNNEL_TOKEN }}'
                  mode: '0600'
                  owner: '{{ instance.subuid }}'
                  group: '{{ instance.subuid }}'
              register: tunnel_token
              no_log: true
              when: env.JARVIS_CF_TUNNEL_TOKEN is defined and env.JARVIS_CF_TUNNEL_TOKEN | length > 0

            - name: '{{ instance.hostname | upper }}: Reconfigure Cloudflared tunnel'
              shell: |
                  pct exec {{ id }} -- bash -c "cloudflared service uninstall || true"
                  pct exec {{ id }} -- bash -c "cloudflared service install {{ env.JARVIS_CF_TUNNEL_TOKEN }}"
              when: tunnel_token.changed | default(false)
              no_log: true

  rescue:
      - debug:
            msg: '{{ instance.hostname }} ({{ id }}) failed to deploy'
  become: true
