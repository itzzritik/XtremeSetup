- vars:
      id: '{{ env.JARVIS_SERVICES.pihole.id }}'
      instance:
          hostname: pihole
          memory: 1024
          swap: 512
          cores: 1
          storage: local-lvm
          ip: '{{ env.JARVIS_NETWORK_PREFIX }}.{{ id }}'
          gateway: '{{ env.JARVIS_GATEWAY }}'
          mac: '{{ env.JARVIS_MAC_PREFIX }}:{{ "%02x" | format(id | int) }}'
          subuid: '100000'
      paths:
          config_pihole: '{{ env.JARVIS_CONFIGS_DIR }}/{{ instance.hostname }}/etc-pihole'
          config_dnsmasq: '{{ env.JARVIS_CONFIGS_DIR }}/{{ instance.hostname }}/etc-dnsmasq.d'
      setupvars_content: |
          PIHOLE_INTERFACE=eth0
          PIHOLE_DNS_1=8.8.8.8
          PIHOLE_DNS_2=8.8.4.4
          QUERY_LOGGING=true
          INSTALL_WEB_SERVER=true
          INSTALL_WEB_INTERFACE=true
          LIGHTTPD_ENABLED=true
          BLOCKING_ENABLED=true
          WEBPASSWORD=
  block:
      # ── Step 1: Health Check ──────────────────────────────────────
      - name: '{{ instance.hostname | upper }}: Health Check'
        include_tasks: ../utils/_health_check.yml
        vars:
            health:
                id: '{{ id }}'
                type: lxc
                url: 'http://{{ instance.ip }}/admin'
                timeout: 5

      # ── Step 2: Provision (only when needed) ──────────────────────
      - name: '{{ instance.hostname | upper }}: Create Config Directories on Host'
        file:
            path: '{{ dir_item }}'
            state: directory
            mode: '0777'
            owner: '{{ instance.subuid }}'
            group: '{{ instance.subuid }}'
            recurse: true
        loop:
            - '{{ paths.config_pihole }}'
            - '{{ paths.config_dnsmasq }}'
        loop_control:
            loop_var: dir_item
        when: needs_provision | bool

      - name: '{{ instance.hostname | upper }}: Provision Instance'
        when: needs_provision | bool
        block:
            - name: '{{ instance.hostname | upper }}: Write setupVars.conf (pre-seed installer)'
              copy:
                  dest: '{{ paths.config_pihole }}/setupVars.conf'
                  content: '{{ setupvars_content }}'
                  owner: '{{ instance.subuid }}'
                  group: '{{ instance.subuid }}'
                  mode: '0644'

            - name: '{{ instance.hostname | upper }}: Create LXC'
              include_tasks: ../utils/_create_lxc.yml
              vars:
                  lxc:
                      id: '{{ id }}'
                      hostname: '{{ instance.hostname }}'
                      cores: '{{ instance.cores }}'
                      memory: '{{ instance.memory }}'
                      swap: '{{ instance.swap }}'
                      disk: 4
                      storage: '{{ instance.storage }}'
                      unprivileged: true
                      ip: '{{ instance.ip }}'
                      gateway: '{{ instance.gateway }}'
                      mac: '{{ instance.mac }}'
                      dns_servers: '{{ env.JARVIS_DNS_SERVERS | default(["8.8.8.8"]) }}'
                      mounts:
                          - src: '{{ paths.config_pihole }}'
                            dest: /etc/pihole
                          - src: '{{ paths.config_dnsmasq }}'
                            dest: /etc/dnsmasq.d
                      base_packages:
                          - curl
                          - ca-certificates
                          - gnupg

            - name: '{{ instance.hostname | upper }}: Install Pi-hole (official unattended)'
              command: >
                  pct exec {{ id }} -- bash -c
                  'curl -sSL https://install.pi-hole.net | bash /dev/stdin --unattended'
              register: pihole_install

            - name: '{{ instance.hostname | upper }}: Show install output'
              debug:
                  var: pihole_install.stdout_lines

            - name: '{{ instance.hostname | upper }}: Create Password Set Script'
              copy:
                  dest: '/tmp/pihole_password_set_{{ id }}.sh'
                  content: |
                      #!/bin/bash
                      set -e
                      export PATH=$PATH:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
                      pihole -a -p ''
                  mode: '0666'
              no_log: true

            - name: '{{ instance.hostname | upper }}: Push Password Script to Container'
              command: pct push {{ id }} /tmp/pihole_password_set_{{ id }}.sh /tmp/set_password.sh
              no_log: true

            - name: '{{ instance.hostname | upper }}: Execute Password Script'
              command: pct exec {{ id }} -- bash /tmp/set_password.sh
              register: set_password
              until: set_password.rc == 0
              retries: 10
              delay: 5
              no_log: true

            - name: '{{ instance.hostname | upper }}: Remove Password Script from Container'
              command: pct exec {{ id }} -- rm -f /tmp/set_password.sh
              ignore_errors: true

            - name: '{{ instance.hostname | upper }}: Remove Password Script from Host'
              file:
                  path: '/tmp/pihole_password_set_{{ id }}.sh'
                  state: absent

            - name: '{{ instance.hostname | upper }}: Wait for ready (port 80)'
              wait_for:
                  host: '{{ instance.ip }}'
                  port: 80
                  delay: 5
                  timeout: 60

      # ── Step 3: Config (always runs) ──────────────────────────────
      - name: '{{ instance.hostname | upper }}: Update setupVars.conf'
        copy:
            dest: '{{ paths.config_pihole }}/setupVars.conf'
            content: '{{ setupvars_content }}'
            owner: '{{ instance.subuid }}'
            group: '{{ instance.subuid }}'
            mode: '0644'
        register: setupvars_result

      - name: '{{ instance.hostname | upper }}: Restart DNS after config change'
        command: pct exec {{ id }} -- pihole restartdns
        when: setupvars_result.changed

  rescue:
      - debug:
            msg: '{{ instance.hostname }} ({{ id }}) failed to deploy'
  become: true
