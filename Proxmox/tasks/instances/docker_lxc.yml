- vars:
      id: '{{ env.JARVIS_SERVICES.docker.id }}'
      ip: '{{ env.JARVIS_NETWORK_PREFIX }}.{{ id }}'
      docker_user: '1000'

  block:
      # --- Step 1: Health Check ---
      - name: 'DOCKER: Health Check'
        include_tasks: ../utils/_health_check.yml
        vars:
            health:
                id: '{{ id }}'
                type: lxc
                url: 'http://{{ ip }}:2375/version'
                timeout: 5

      # --- Step 2: Provision (if needed) ---
      - name: 'DOCKER: Create Host Config Directory'
        file:
            path: '{{ env.JARVIS_CONFIGS_DIR }}'
            state: directory
            mode: '0755'
            owner: '100000'
            group: '100000'

      - name: 'DOCKER: Provision LXC'
        when: needs_provision | bool
        block:
            - name: 'DOCKER: Create LXC Container'
              include_tasks: ../utils/_create_lxc.yml
              vars:
                  lxc:
                      id: '{{ id }}'
                      hostname: docker
                      cores: 4
                      memory: 8192
                      swap: 512
                      disk: 32
                      storage: local-lvm
                      unprivileged: true
                      features:
                          - nesting
                          - keyctl
                      firewall: false
                      onboot: true
                      ip: '{{ ip }}'
                      gateway: '{{ env.JARVIS_GATEWAY }}'
                      mac: '{{ env.JARVIS_MAC_PREFIX }}:{{ "%02x" | format(id | int) }}'
                      dns_servers: '{{ env.JARVIS_DNS_SERVERS }}'
                      mounts:
                          - src: /mnt/ssd
                            dest: /media/ssd
                          - src: '{{ env.JARVIS_CONFIGS_DIR }}'
                            dest: /root/configs
                      base_packages:
                          - curl
                          - ca-certificates
                          - gnupg
                          - sqlite3

            - name: 'DOCKER: Install Docker via official apt repo'
              shell: |
                  pct exec {{ id }} -- bash -c '
                  export DEBIAN_FRONTEND=noninteractive
                  install -m 0755 -d /etc/apt/keyrings
                  curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
                  chmod a+r /etc/apt/keyrings/docker.gpg
                  echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
                  apt-get update
                  apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
                  systemctl enable --now docker
                  '

            - name: 'DOCKER: Enable Docker TCP on port 2375'
              shell: |
                  pct exec {{ id }} -- bash -c '
                  mkdir -p /etc/systemd/system/docker.service.d
                  echo -e "[Service]\nExecStart=\nExecStart=/usr/bin/dockerd -H fd:// -H tcp://0.0.0.0:2375" > /etc/systemd/system/docker.service.d/override.conf
                  systemctl daemon-reload && systemctl restart docker
                  '

            - name: 'DOCKER: Wait for Docker API'
              wait_for:
                  host: '{{ ip }}'
                  port: 2375
                  delay: 5
                  timeout: 60

      # --- Step 3: Config (always) ---
      - name: 'DOCKER: Deploy Apps'
        include_tasks: 'docker_lxc/{{ docker_app_item }}.yml'
        loop:
            - backrest
            - voidauth
            - homer
            - code
            - alist
            - media
        loop_control:
            loop_var: docker_app_item

  rescue:
      - debug:
            msg: 'docker ({{ id }}) failed to deploy'
  become: true
