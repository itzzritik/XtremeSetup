- vars:
      id: '{{ env.JARVIS_SERVICES.home.id }}'
      instance:
          hostname: home
          memory: 4096
          cores: 2
          storage: local-lvm
          bridge: vmbr0
          ip: '{{ env.JARVIS_NETWORK_PREFIX }}.{{ id }}'
          gateway: '{{ env.JARVIS_GATEWAY }}'
          dns_servers: '{{ env.JARVIS_DNS_SERVERS }}'
          port: '{{ env.JARVIS_SERVICES.home.port }}'
          mac: '{{ env.JARVIS_MAC_PREFIX }}:{{ "%02x" | format(id | int) }}'
  block:
      # ── Step 1: Health Check ───────────────────────────────────────────
      - name: '{{ instance.hostname | upper }}: Health check'
        include_tasks: ../utils/_health_check.yml
        vars:
            health:
                id: '{{ id }}'
                type: vm
                url: 'http://{{ instance.ip }}:{{ instance.port }}'
                timeout: 5
                status_codes: [200, 401]

      # ── Step 2: Provision ──────────────────────────────────────────────
      - name: '{{ instance.hostname | upper }}: Provision VM'
        when: needs_provision | bool
        block:
            - name: '{{ instance.hostname | upper }}: Restart Proxmox Host'
              include_tasks: ../system/restart.yml

            - name: '{{ instance.hostname | upper }}: Create VM via shared module'
              include_tasks: ../utils/_create_vm.yml
              vars:
                  vm:
                      id: '{{ id }}'
                      hostname: '{{ instance.hostname }}'
                      cores: '{{ instance.cores }}'
                      memory: '{{ instance.memory }}'
                      storage: '{{ instance.storage }}'
                      bridge: '{{ instance.bridge }}'
                      mac: '{{ instance.mac }}'
                      ip: '{{ instance.ip }}'
                      gateway: '{{ instance.gateway }}'
                      dns_servers: '{{ instance.dns_servers }}'

      # ── Step 3: Backup Restore ─────────────────────────────────────────
      - name: '{{ instance.hostname | upper }}: Restore backup from Google Drive'
        when:
            - provisioned | default(false) | bool
            - env.JARVIS_GDRIVE_ACCESS_TOKEN is defined
        block:
            - name: '{{ instance.hostname | upper }}: Wait for HA API ready'
              uri:
                  url: 'http://{{ instance.ip }}:{{ instance.port }}/api/'
                  status_code: [200, 401]
              register: api_ready
              retries: 30
              delay: 10
              until: api_ready.status in [200, 401]

            - name: '{{ instance.hostname | upper }}: Wait for onboarding endpoint'
              uri:
                  url: 'http://{{ instance.ip }}:{{ instance.port }}/api/onboarding'
                  status_code: [200, 404]
              register: onboarding_attempt1
              retries: 12
              delay: 30
              until: onboarding_attempt1.status in [200, 404]
              ignore_errors: true

            - name: '{{ instance.hostname | upper }}: Restart VM and retry onboarding'
              block:
                  - shell: qm stop {{ id }}; sleep 30; qm start {{ id }}
                  - uri:
                        url: 'http://{{ instance.ip }}:{{ instance.port }}/api/onboarding'
                        status_code: [200, 404]
                    register: onboarding_attempt2
                    retries: 12
                    delay: 30
                    until: onboarding_attempt2.status in [200, 404]
                    failed_when: false
              when: onboarding_attempt1 is failed

            - set_fact:
                  onboarding_check: "{{ onboarding_attempt2 if (onboarding_attempt1 is failed and onboarding_attempt2 is not skipped) else onboarding_attempt1 }}"

            - fail:
                  msg: 'Onboarding endpoint unreachable after 2 attempts'
              when: onboarding_check is failed or onboarding_check.status is not defined

            - name: '{{ instance.hostname | upper }}: Debug onboarding status'
              debug:
                  msg:
                      - 'Onboarding status: {{ onboarding_check.status }}'
                      - 'Onboarding JSON: {{ onboarding_check.json | default("N/A") }}'
                      - 'Should restore: {{ onboarding_check.status == 200 and (onboarding_check.json | selectattr("done", "equalto", false) | list | length > 0) }}'

            # Only restore if onboarding is incomplete
            - name: '{{ instance.hostname | upper }}: Get "Home Assistant" folder ID from Google Drive'
              uri:
                  url: 'https://www.googleapis.com/drive/v3/files?q={{ gdrive_query | urlencode }}&fields=files(id,name)'
                  headers:
                      Authorization: 'Bearer {{ env.JARVIS_GDRIVE_ACCESS_TOKEN }}'
                  status_code: 200
              vars:
                  gdrive_query: "name = 'Home Assistant' and mimeType = 'application/vnd.google-apps.folder' and trashed=false"
              register: gdrive_folder
              retries: 3
              delay: 2
              no_log: true
              when: >
                  onboarding_check.status == 200 and
                  (onboarding_check.json | selectattr('done', 'equalto', false) | list | length > 0)

            - name: '{{ instance.hostname | upper }}: Get latest backup from Google Drive folder'
              uri:
                  url: "https://www.googleapis.com/drive/v3/files?q={{ gdrive_query | urlencode }}&fields=files(id,name,createdTime)&orderBy={{ 'createdTime desc' | urlencode }}&pageSize=1"
                  headers:
                      Authorization: 'Bearer {{ env.JARVIS_GDRIVE_ACCESS_TOKEN }}'
                  status_code: 200
              vars:
                  gdrive_query: "'{{ (gdrive_folder.json.files | first).id }}' in parents and name contains '.tar' and trashed=false"
              register: gdrive_backup
              retries: 3
              delay: 2
              no_log: true
              when: >
                  gdrive_folder is not skipped and
                  gdrive_folder.json.files | length > 0

            # ── Discrete restore steps via qm guest exec ──────────────────
            - name: '{{ instance.hostname | upper }}: Download backup into VM'
              shell: >
                  qm guest exec {{ id }} --timeout 1200 -- bash -c
                  "curl -sL -o '/mnt/data/supervisor/backup/{{ (gdrive_backup.json.files | first).name }}'
                  'https://www.googleapis.com/drive/v3/files/{{ (gdrive_backup.json.files | first).id }}?alt=media'
                  -H 'Authorization: Bearer {{ env.JARVIS_GDRIVE_ACCESS_TOKEN }}'"
              register: backup_download
              failed_when: >
                  backup_download.rc != 0 or
                  (backup_download.stdout | from_json)['exitcode'] | default(1) != 0
              no_log: true
              when: gdrive_backup is not skipped and gdrive_backup.json.files | default([]) | length > 0

            - name: '{{ instance.hostname | upper }}: Run supervisor repair'
              shell: >
                  qm guest exec {{ id }} --timeout 120 -- ha supervisor repair
              register: supervisor_repair
              failed_when: >
                  supervisor_repair.rc != 0 or
                  (supervisor_repair.stdout | from_json)['exitcode'] | default(1) != 0
              when: backup_download is not skipped and backup_download is changed

            - name: '{{ instance.hostname | upper }}: Reload backups'
              shell: >
                  qm guest exec {{ id }} --timeout 120 -- ha backups reload
              register: backups_reload
              failed_when: >
                  backups_reload.rc != 0 or
                  (backups_reload.stdout | from_json)['exitcode'] | default(1) != 0
              when: backup_download is not skipped and backup_download is changed

            - name: '{{ instance.hostname | upper }}: Wait for backups to index'
              wait_for:
                  timeout: 10
              when: backup_download is not skipped and backup_download is changed

            - name: '{{ instance.hostname | upper }}: Get backup slug'
              shell: >
                  qm guest exec {{ id }} --timeout 120 -- bash -c
                  "ha backups list --raw-json | jq -r '.data.backups | sort_by(.date) | reverse | .[0].slug'"
              register: backup_slug_raw
              failed_when: >
                  backup_slug_raw.rc != 0 or
                  (backup_slug_raw.stdout | from_json)['exitcode'] | default(1) != 0 or
                  (backup_slug_raw.stdout | from_json)['out-data'] | default('') | trim | length == 0
              when: backup_download is not skipped and backup_download is changed

            - name: '{{ instance.hostname | upper }}: Extract backup slug'
              set_fact:
                  backup_slug: "{{ (backup_slug_raw.stdout | from_json)['out-data'] | trim }}"
              when: backup_slug_raw is not skipped and backup_slug_raw is not failed

            - name: '{{ instance.hostname | upper }}: Get backup info'
              shell: >
                  qm guest exec {{ id }} --timeout 120 -- bash -c
                  "ha backups info '{{ backup_slug }}' --raw-json"
              register: backup_info_raw
              failed_when: >
                  backup_info_raw.rc != 0 or
                  (backup_info_raw.stdout | from_json)['exitcode'] | default(1) != 0
              when: backup_slug is defined

            - name: '{{ instance.hostname | upper }}: Parse backup info'
              set_fact:
                  backup_info: "{{ (backup_info_raw.stdout | from_json)['out-data'] | from_json }}"
              when: backup_info_raw is not skipped and backup_info_raw is not failed

            - name: '{{ instance.hostname | upper }}: Wait before restore'
              wait_for:
                  timeout: 10
              when: backup_info is defined

            # ── Full backup restore ───────────────────────────────────────
            - name: '{{ instance.hostname | upper }}: Restore full backup'
              shell: >
                  qm guest exec {{ id }} --timeout 1800 -- bash -c
                  "ha backups restore '{{ backup_slug }}' --password '{{ env.JARVIS_HA_DECRYPT_KEY }}'"
              register: restore_full
              failed_when: >
                  restore_full.rc != 0 or
                  (restore_full.stdout | from_json)['exitcode'] | default(1) != 0
              no_log: true
              when:
                  - backup_info is defined
                  - backup_info.data.type == 'full'

            # ── Partial backup restore: folders ───────────────────────────
            - name: '{{ instance.hostname | upper }}: Restore partial backup — folders'
              shell: >
                  qm guest exec {{ id }} --timeout 1800 -- bash -c
                  "ha backups restore '{{ backup_slug }}'
                  --folders {{ backup_info.data.folders | join(' ') }}
                  --password '{{ env.JARVIS_HA_DECRYPT_KEY }}'"
              register: restore_folders
              failed_when: >
                  restore_folders.rc != 0 or
                  (restore_folders.stdout | from_json)['exitcode'] | default(1) != 0
              no_log: true
              when:
                  - backup_info is defined
                  - backup_info.data.type != 'full'
                  - backup_info.data.folders | default([]) | length > 0

            - name: '{{ instance.hostname | upper }}: Restore partial backup — addons'
              shell: >
                  qm guest exec {{ id }} --timeout 1800 -- bash -c
                  "ha backups restore '{{ backup_slug }}'
                  --addons {{ backup_info.data.addons | map(attribute='slug') | join(' ') }}
                  --password '{{ env.JARVIS_HA_DECRYPT_KEY }}'"
              register: restore_addons
              failed_when: >
                  restore_addons.rc != 0 or
                  (restore_addons.stdout | from_json)['exitcode'] | default(1) != 0
              no_log: true
              when:
                  - backup_info is defined
                  - backup_info.data.type != 'full'
                  - backup_info.data.addons | default([]) | length > 0

            - name: '{{ instance.hostname | upper }}: Restore partial backup — homeassistant'
              shell: >
                  qm guest exec {{ id }} --timeout 1800 -- bash -c
                  "ha backups restore '{{ backup_slug }}'
                  --homeassistant
                  --password '{{ env.JARVIS_HA_DECRYPT_KEY }}'"
              register: restore_ha
              failed_when: >
                  restore_ha.rc != 0 or
                  (restore_ha.stdout | from_json)['exitcode'] | default(1) != 0
              no_log: true
              when:
                  - backup_info is defined
                  - backup_info.data.type != 'full'
                  - backup_info.data.homeassistant is not none

            # ── Post-restore ──────────────────────────────────────────────
            - name: '{{ instance.hostname | upper }}: Reboot VM to apply restore'
              shell: sleep 10 && qm reboot {{ id }}
              args:
                  executable: /bin/bash
              ignore_errors: true
              when: backup_info is defined

            - name: '{{ instance.hostname | upper }}: Wait for HA restart after restore'
              uri:
                  url: 'http://{{ instance.ip }}:{{ instance.port }}/api/'
                  status_code: [200, 401]
              register: restore_wait
              retries: 50
              delay: 20
              until: restore_wait.status in [200, 401]
              when: backup_info is defined

      # ── Step 4: Verify (always runs) ───────────────────────────────────
      - name: '{{ instance.hostname | upper }}: Verify HA API reachable'
        uri:
            url: 'http://{{ instance.ip }}:{{ instance.port }}/api/'
            status_code: [200, 401]
        register: final_check
        retries: 5
        delay: 10
        until: final_check.status in [200, 401]

      - name: '{{ instance.hostname | upper }}: Deployment summary'
        debug:
            msg:
                - 'Home Assistant OS VM deployed successfully'
                - ''
                - 'Access URLs:'
                - '  - http://{{ instance.ip }}:{{ instance.port }}'
                - '  - http://{{ instance.hostname }}.local:{{ instance.port }}'
                - ''
                - 'VM Details:'
                - '  - VM ID: {{ id }}'
                - '  - Hostname: {{ instance.hostname }}'
                - '  - Static IP: {{ instance.ip }}'
                - '  - Gateway: {{ instance.gateway }}'
                - '  - DNS: {{ instance.dns_servers | join(", ") }}'
                - '  - CPU Cores: {{ instance.cores }}'
                - '  - Memory: {{ instance.memory }}MB'
                - ''
                - '{% if provisioned | default(false) | bool %}Provisioned: Fresh install via shared module{% else %}Provisioned: Skipped (already healthy){% endif %}'
                - '{% if backup_info is defined %}Backup: Restored from Google Drive{% elif env.JARVIS_GDRIVE_ACCESS_TOKEN is not defined %}Backup: Google Drive not configured{% else %}Backup: Skipped{% endif %}'

  rescue:
      - debug:
            msg: '{{ instance.hostname }} ({{ id }}) failed to deploy'
  become: true
