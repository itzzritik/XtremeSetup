- vars:
      id: '{{ env.JARVIS_SERVICES.jellyfin.id }}'
      instance:
          hostname: jellyfin
          memory: 6144
          swap: 512
          cores: 4
          storage: local-lvm
          ip: '{{ env.JARVIS_NETWORK_PREFIX }}.{{ id }}'
          gateway: '{{ env.JARVIS_GATEWAY }}'
          mac: '{{ env.JARVIS_MAC_PREFIX }}:{{ "%02x" | format(id | int) }}'
      paths:
          config: '{{ env.JARVIS_CONFIGS_DIR }}/{{ instance.hostname }}/etc'
          data: '{{ env.JARVIS_CONFIGS_DIR }}/{{ instance.hostname }}/lib'
  block:
      # ── Step 1: Health Check ──────────────────────────────────────────
      - name: '{{ instance.hostname | upper }}: Health Check'
        include_tasks: ../utils/_health_check.yml
        vars:
            health:
                id: '{{ id }}'
                type: lxc
                url: 'http://{{ instance.ip }}:8096'
                timeout: 5

      # ── Step 2: Provision (only when needed) ──────────────────────────
      - name: '{{ instance.hostname | upper }}: Create Config Directories on Host'
        file:
            path: '{{ dir_item }}'
            state: directory
            mode: '0777'
            recurse: true
        loop:
            - '{{ paths.config }}'
            - '{{ paths.data }}'
        loop_control:
            loop_var: dir_item

      - name: '{{ instance.hostname | upper }}: Provision Instance'
        when: needs_provision | bool
        block:
            - name: '{{ instance.hostname | upper }}: Create LXC'
              include_tasks: ../utils/_create_lxc.yml
              vars:
                  lxc:
                      id: '{{ id }}'
                      hostname: '{{ instance.hostname }}'
                      cores: '{{ instance.cores }}'
                      memory: '{{ instance.memory }}'
                      swap: '{{ instance.swap }}'
                      disk: 16
                      storage: '{{ instance.storage }}'
                      unprivileged: true
                      features:
                          - nesting
                      firewall: true
                      onboot: true
                      ip: '{{ instance.ip }}'
                      gateway: '{{ instance.gateway }}'
                      mac: '{{ instance.mac }}'
                      mounts:
                          - { src: '/mnt/ssd', dest: '/media/ssd' }
                          - { src: '{{ paths.config }}', dest: '/etc/jellyfin' }
                          - { src: '{{ paths.data }}', dest: '/var/lib/jellyfin' }
                      lxc_extra: |
                          lxc.cgroup2.devices.allow: c 226:* rwm
                          lxc.mount.entry: /dev/dri dev/dri none bind,optional,create=dir
                          lxc.mount.entry: var/cache/transcodes var/lib/jellyfin/transcodes none bind,create=dir,optional 0 0

            - name: '{{ instance.hostname | upper }}: Install Jellyfin via official repo'
              shell: |
                  pct exec {{ id }} -- bash -c '
                  export DEBIAN_FRONTEND=noninteractive
                  curl -fsSL https://repo.jellyfin.org/install-debpackage.sh | bash
                  '
              register: jellyfin_install
              retries: 2
              delay: 5
              until: jellyfin_install.rc == 0

            - name: '{{ instance.hostname | upper }}: Show install output'
              debug:
                  var: jellyfin_install.stdout_lines

            - name: '{{ instance.hostname | upper }}: Add jellyfin user to GPU groups'
              shell: |
                  pct exec {{ id }} -- bash -c '
                  usermod -aG render jellyfin
                  usermod -aG video jellyfin
                  '

            - name: '{{ instance.hostname | upper }}: Enable jellyfin service'
              shell: pct exec {{ id }} -- bash -c 'systemctl enable jellyfin'

      # ── Step 3: Config (always runs) ──────────────────────────────────
      - name: '{{ instance.hostname | upper }}: Verify GPU passthrough'
        shell: pct exec {{ id }} -- test -e /dev/dri/renderD128
        register: gpu_check
        failed_when: false
        changed_when: false

      - name: '{{ instance.hostname | upper }}: Warn if GPU not available'
        debug:
            msg: 'WARNING: /dev/dri/renderD128 not found in container — GPU passthrough may not be working'
        when: gpu_check.rc != 0

      - name: '{{ instance.hostname | upper }}: Verify jellyfin user in render group'
        shell: pct exec {{ id }} -- id -nG jellyfin | grep -q render
        register: render_check
        failed_when: false
        changed_when: false

      - name: '{{ instance.hostname | upper }}: Warn if jellyfin not in render group'
        debug:
            msg: 'WARNING: jellyfin user is not in render group — GPU acceleration may not work'
        when: render_check.rc != 0

      - name: '{{ instance.hostname | upper }}: Restart jellyfin after provision'
        shell: pct exec {{ id }} -- systemctl restart jellyfin
        when: provisioned | default(false) | bool

  rescue:
      - debug:
            msg: '{{ instance.hostname }} ({{ id }}) failed to deploy'
  become: true
