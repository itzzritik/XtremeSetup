- vars:
      id: '{{ env.JARVIS_SERVICES.storage.id }}'
      lxc:
          id: '{{ id }}'
          hostname: storage
          memory: 1024
          swap: 256
          cores: 2
          disk: 8
          storage: local-lvm
          ip: '{{ env.JARVIS_NETWORK_PREFIX }}.{{ id }}'
          gateway: '{{ env.JARVIS_GATEWAY }}'
          mac: '{{ env.JARVIS_MAC_PREFIX }}:{{ "%02x" | format(id | int) }}'
          dns_servers: '{{ env.JARVIS_DNS_SERVERS }}'
          unprivileged: false
          features:
              - nesting
          firewall: true
          onboot: true
          mounts:
              - src: /mnt/ssd
                dest: /media/ssd
          lxc_extra: 'lxc.apparmor.profile: unconfined'
          base_packages:
              - curl
              - ca-certificates
              - gnupg
              - samba
              - nfs-kernel-server
      shares:
          - name: ssd
            path: '/media/ssd'
            auth_required: true
            comment: 'SSD Full Access'
          - name: media
            path: '/media/ssd/Media'
            auth_required: false
            comment: 'Media Library (Guest Access)'
  block:
      # ── Step 1: Health Check ──────────────────────────────────────────
      - name: 'STORAGE: Health Check'
        include_tasks: ../utils/_health_check.yml
        vars:
            health:
                id: '{{ id }}'
                type: lxc

      - name: 'STORAGE: Check Privileged Status'
        shell: "pct config {{ id }} | grep -q 'unprivileged: 1'"
        register: _storage_is_unprivileged
        failed_when: false
        changed_when: false
        when: instance_state.exists | bool

      - name: 'STORAGE: Force Provision if Unprivileged (NFS requires privileged)'
        set_fact:
            needs_provision: true
        when:
            - instance_state.exists | bool
            - _storage_is_unprivileged.rc | default(1) == 0

      - name: 'STORAGE: Check SMB Service'
        command: smbclient -L //{{ lxc.ip }} -U {{ env.JARVIS_ADMIN_USERNAME }}%{{ env.JARVIS_ADMIN_PASSWORD }}
        register: _storage_smb_check
        failed_when: false
        changed_when: false
        no_log: true
        when:
            - not needs_provision | bool
            - instance_state.running | bool

      - name: 'STORAGE: Check NFS Service'
        command: showmount -e {{ lxc.ip }}
        register: _storage_nfs_check
        failed_when: false
        changed_when: false
        when:
            - not needs_provision | bool
            - instance_state.running | bool

      - name: 'STORAGE: Force Provision if SMB/NFS Down'
        set_fact:
            needs_provision: true
        when:
            - not needs_provision | bool
            - instance_state.running | bool
            - (_storage_smb_check.rc | default(1) != 0) or (_storage_nfs_check.rc | default(1) != 0)

      # ── Step 2: Provision ─────────────────────────────────────────────
      - name: 'STORAGE: Provision LXC'
        include_tasks: ../utils/_create_lxc.yml
        when: needs_provision | bool

      - name: 'STORAGE: Mask Unnecessary NFS GSS Services'
        shell: |
            pct exec {{ id }} -- bash -c '
            systemctl mask rpc-gssd rpc-svcgssd
            systemctl disable --now rpc-gssd rpc-svcgssd || true
            '
        when: needs_provision | bool

      # ── Step 3: Config (always) ───────────────────────────────────────
      - name: 'STORAGE: Write Samba Config'
        shell: |
            pct exec {{ id }} -- bash -c "cat <<'EOF' > /etc/samba/smb.conf
            [global]
            workgroup = WORKGROUP
            server string = Storage Server
            security = user
            map to guest = Bad User
            log file = /var/log/samba/%m.log
            max log size = 50

            {% for share in shares %}
            [{{ share.name }}]
            path = {{ share.path }}
            comment = {{ share.comment }}
            browseable = yes
            writable = yes
            {% if share.auth_required %}
            guest ok = no
            valid users = {{ env.JARVIS_ADMIN_USERNAME }}
            create mask = 0664
            directory mask = 0775
            {% else %}
            guest ok = yes
            read only = no
            create mask = 0666
            directory mask = 0777
            force user = nobody
            force group = nogroup
            {% endif %}

            {% endfor %}
            EOF"
        register: _storage_smb_conf
        changed_when: _storage_smb_conf.rc == 0

      - name: 'STORAGE: Set Samba Password'
        shell: |
            pct exec {{ id }} -- bash -c "
            (echo '{{ env.JARVIS_ADMIN_PASSWORD }}'; echo '{{ env.JARVIS_ADMIN_PASSWORD }}') | smbpasswd -a -s {{ env.JARVIS_ADMIN_USERNAME }}
            smbpasswd -e {{ env.JARVIS_ADMIN_USERNAME }}
            "
        changed_when: false
        no_log: true

      - name: 'STORAGE: Write NFS Exports'
        shell: |
            pct exec {{ id }} -- bash -c "cat <<'EOF' > /etc/exports
            {% for share in shares %}
            {% if share.auth_required %}
            {{ share.path }} {{ env.JARVIS_NETWORK_PREFIX }}.0/24(rw,sync,no_subtree_check,sec=sys)
            {% else %}
            {{ share.path }} {{ env.JARVIS_NETWORK_PREFIX }}.0/24(rw,sync,no_subtree_check,all_squash,anonuid=65534,anongid=65534)
            {% endif %}
            {% endfor %}
            EOF"
        register: _storage_nfs_exports
        changed_when: _storage_nfs_exports.rc == 0

      - name: 'STORAGE: Set Share Permissions'
        shell: |
            pct exec {{ id }} -- bash -c "
            {% for share in shares %}
            chmod -R {{ '777' if not share.auth_required else '775' }} {{ share.path }} 2>/dev/null || true
            {% endfor %}
            "
        changed_when: false

      - name: 'STORAGE: Restart Samba Services'
        shell: |
            pct exec {{ id }} -- bash -c '
            systemctl enable --now smbd nmbd 2>/dev/null || true
            systemctl restart smbd nmbd
            '

      - name: 'STORAGE: Restart NFS Services'
        shell: |
            pct exec {{ id }} -- bash -c '
            exportfs -ra
            systemctl enable --now rpcbind nfs-kernel-server 2>/dev/null || true
            systemctl restart rpcbind nfs-kernel-server
            '

      - name: 'STORAGE: Verify Services'
        shell: |
            pct exec {{ id }} -- bash -c '
            echo "SMB: $(systemctl is-active smbd)"
            echo "NFS: $(systemctl is-active nfs-kernel-server)"
            '
        register: _storage_service_status
        failed_when: false

      - name: 'STORAGE: Show Service Status'
        debug:
            msg: '{{ _storage_service_status.stdout_lines }}'

  rescue:
      - debug:
            msg: 'STORAGE ({{ id }}) failed to deploy'
  become: true
