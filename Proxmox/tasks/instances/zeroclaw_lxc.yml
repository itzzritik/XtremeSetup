- vars:
      app_name: zeroclaw
      id: '{{ env.JARVIS_SERVICES.zeroclaw.id }}'
      instance:
          hostname: zeroclaw
          memory: 512
          swap: 256
          cores: 1
          storage: local-lvm
          ip: '{{ env.JARVIS_NETWORK_PREFIX }}.{{ id }}'
          gateway: '{{ env.JARVIS_GATEWAY }}'
          mac: '{{ env.JARVIS_MAC_PREFIX }}:{{ "%02x" | format(id | int) }}'
  block:
      - name: '{{ instance.hostname | upper }}: Check if Instance exists'
        uri:
            url: 'http://{{ instance.ip }}:{{ env.JARVIS_SERVICES[app_name].port }}'
            timeout: 5
        register: instance_check
        failed_when: false
        changed_when: false

      - name: '{{ instance.hostname | upper }}: Create Config Directories'
        file:
            path: '{{ dir_item }}'
            state: directory
            owner: '100000'
            group: '100000'
            mode: '0700'
        loop:
            - '{{ env.JARVIS_CONFIGS_DIR }}/zeroclaw'
            - '{{ env.JARVIS_CONFIGS_DIR }}/zeroclaw/workspace'
        loop_control:
            loop_var: dir_item

      - name: '{{ instance.hostname | upper }}: Write Soul'
        copy:
            dest: '{{ env.JARVIS_CONFIGS_DIR }}/zeroclaw/workspace/SOUL.md'
            content: |-
                You are Jarvis — sharp, witty, and always useful.
                Use dry humor when appropriate. Keep replies concise & punchy.
                Act first, explain later. No disclaimers. No hedging.
            owner: '100000'
            group: '100000'
            mode: '0644'

      - name: '{{ instance.hostname | upper }}: Write Identity'
        copy:
            dest: '{{ env.JARVIS_CONFIGS_DIR }}/zeroclaw/workspace/IDENTITY.md'
            content: |-
                On first message from anyone, ask their full name.
                Key all memories by full name (e.g. "James Bond: loves cupcakes").
                Recall by name before every reply — same person, any channel.
            owner: '100000'
            group: '100000'
            mode: '0644'

      - name: '{{ instance.hostname | upper }}: Write Config'
        no_log: true
        copy:
            dest: '{{ env.JARVIS_CONFIGS_DIR }}/zeroclaw/config.toml'
            content: |-
                default_provider = "openrouter"
                default_model = "stepfun/step-3.5-flash:free"

                [agent]
                max_tool_iterations = 20
                max_history_messages = 50
                compact_context = true

                [autonomy]
                level = "full"
                workspace_only = false
                allowed_commands = ["*"]
                block_high_risk_commands = false
                require_approval_for_medium_risk = false

                [memory]
                backend = "sqlite"
                auto_save = true

                [skills]
                open_skills_enabled = true

                [channels_config.telegram]
                bot_token = {{ env.JARVIS_BOT_TELEGRAM_KEY | to_json }}
                allowed_users = ["*"]

                [channels_config.whatsapp]
                session_path = "/root/.zeroclaw/whatsapp-session.db"
                pair_phone = {{ env.JARVIS_WHATSAPP_BOT_PHONE | to_json }}
                allowed_numbers = [{{ env.JARVIS_WHATSAPP_ADMIN_PHONE | to_json }}]
                mention_only = true

                [reliability]
                retry_count = 3
                retry_delay_ms = 1000
            owner: '100000'
            group: '100000'
            mode: '0600'
        register: zeroclaw_config

      - name: '{{ instance.hostname | upper }}: Provision Infrastructure'
        when: instance_check.status | default(0) != 200
        block:
            - name: '{{ instance.hostname | upper }}: Stop and Destroy LXC'
              shell: pct stop {{ id }}; pct destroy {{ id }}
              failed_when: false
              changed_when: false

            - name: '{{ instance.hostname | upper }}: Download Latest Template'
              shell: |
                  pveam update >&2
                  TEMPLATE=$(pveam available | grep -oP 'ubuntu-(2[024-9]|[3-9][0-9])\.04-standard[^\s]+' | sort -V | tail -1)
                  pveam download local "$TEMPLATE" >&2 || true
                  echo "$TEMPLATE"
              register: template_result
              changed_when: false

            - name: '{{ instance.hostname | upper }}: Create LXC'
              command: >
                  pct create {{ id }} local:vztmpl/{{ template_result.stdout | trim }}
                  --hostname {{ instance.hostname }}
                  --cores {{ instance.cores }}
                  --memory {{ instance.memory }}
                  --swap {{ instance.swap }}
                  --rootfs {{ instance.storage }}:4
                  --net0 name=eth0,bridge=vmbr0,ip={{ instance.ip }}/24,gw={{ instance.gateway }},hwaddr={{ instance.mac }}
                  --unprivileged 1
                  --features nesting=1
                  --onboot 1

            - name: '{{ instance.hostname | upper }}: Configure Bind Mounts'
              blockinfile:
                  path: '/etc/pve/lxc/{{ id }}.conf'
                  marker: '# {mark} ANSIBLE MANAGED BLOCK'
                  block: |
                      mp0: {{ env.JARVIS_CONFIGS_DIR }}/zeroclaw,mp=/root/.zeroclaw

            - name: '{{ instance.hostname | upper }}: Start LXC'
              command: pct start {{ id }}

            - name: '{{ instance.hostname | upper }}: Wait for Network'
              shell: pct exec {{ id }} -- ping -c 1 -W 2 {{ env.JARVIS_DNS_SERVERS[0] }}
              register: network_check
              until: network_check.rc == 0
              retries: 10
              delay: 3

            - name: '{{ instance.hostname | upper }}: Enable Console Autologin'
              shell: >
                  pct exec {{ id }} -- bash -c "mkdir -p /etc/systemd/system/container-getty@1.service.d &&
                  echo -e '[Service]\nExecStart=\nExecStart=-/sbin/agetty --autologin root --noclear --keep-baud tty%I 115200,38400,9600 \$TERM' > /etc/systemd/system/container-getty@1.service.d/override.conf &&
                  systemctl daemon-reload && systemctl restart container-getty@1.service"

            - name: '{{ instance.hostname | upper }}: Install Dependencies'
              shell: |
                  pct exec {{ id }} -- bash -c '
                  export DEBIAN_FRONTEND=noninteractive
                  apt-get update && apt-get install -y curl iptables-persistent
                  '

            - name: '{{ instance.hostname | upper }}: Install ZeroClaw'
              shell: |
                  pct exec {{ id }} -- bash -c '
                  cd /tmp
                  curl -LsSf https://github.com/zeroclaw-labs/zeroclaw/releases/latest/download/zeroclaw-x86_64-unknown-linux-gnu.tar.gz -o zeroclaw.tar.gz
                  tar -xzf zeroclaw.tar.gz
                  mv zeroclaw /usr/local/bin/zeroclaw
                  chmod +x /usr/local/bin/zeroclaw
                  rm -f zeroclaw.tar.gz
                  /usr/local/bin/zeroclaw --version
                  '

            - name: '{{ instance.hostname | upper }}: Configure Firewall'
              shell: |
                  pct exec {{ id }} -- bash -c "
                  iptables -F && iptables -X && iptables -Z

                  iptables -P INPUT DROP
                  iptables -P FORWARD DROP
                  iptables -P OUTPUT DROP

                  iptables -A INPUT -i lo -j ACCEPT
                  iptables -A OUTPUT -o lo -j ACCEPT
                  iptables -A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT
                  iptables -A OUTPUT -m state --state ESTABLISHED,RELATED -j ACCEPT

                  iptables -A OUTPUT -p udp --dport 53 -j ACCEPT
                  iptables -A OUTPUT -p tcp --dport 53 -j ACCEPT
                  iptables -A OUTPUT -p tcp --dport 80 -j ACCEPT
                  iptables -A OUTPUT -p tcp --dport 443 -j ACCEPT

                  iptables -A INPUT -p tcp --dport {{ env.JARVIS_SERVICES[app_name].port }} -s {{ env.JARVIS_NETWORK_PREFIX }}.{{ env.JARVIS_SERVICES.traefik.id }} -j ACCEPT
                  iptables -A INPUT -p tcp --dport {{ env.JARVIS_SERVICES[app_name].port }} -s {{ env.JARVIS_NETWORK_PREFIX }}.0/24 -j ACCEPT

                  iptables-save > /etc/iptables/rules.v4
                  "

            - name: '{{ instance.hostname | upper }}: Install Restart Helper'
              shell: |
                  pct exec {{ id }} -- bash -c "
                  echo '#!/usr/bin/env bash
                  systemctl restart zeroclaw' > /usr/local/bin/re
                  chmod +x /usr/local/bin/re
                  "

      - name: '{{ instance.hostname | upper }}: Configure Systemd Service'
        shell: |
            pct exec {{ id }} -- bash -c "
            cat <<'EOF' > /etc/systemd/system/zeroclaw.service
            [Unit]
            Description=ZeroClaw AI Assistant
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=/root
            ExecStart=/usr/local/bin/zeroclaw daemon
            Restart=always
            RestartSec=10
            Environment=OPENROUTER_API_KEY={{ env.JARVIS_AI_OPENROUTER_KEY }}

            [Install]
            WantedBy=multi-user.target
            EOF

            systemctl daemon-reload
            systemctl enable --now zeroclaw
            "
        register: zeroclaw_service

      - name: '{{ instance.hostname | upper }}: Restart on Config Change'
        shell: pct exec {{ id }} -- systemctl restart zeroclaw
        when: (zeroclaw_config is changed or zeroclaw_service is changed) and instance_check.status | default(0) == 200

      - name: '{{ instance.hostname | upper }}: Verify Service'
        shell: pct exec {{ id }} -- systemctl is-active zeroclaw
        register: service_status
        until: service_status.stdout | default('') == 'active'
        retries: 6
        delay: 5
        failed_when: false
        changed_when: false

      - name: '{{ instance.hostname | upper }}: Show Status'
        debug:
            msg: 'ZeroClaw: {{ service_status.stdout | default("not running") }}'

  rescue:
      - debug:
            msg: '{{ instance.hostname }} ({{ id }}) failed to deploy'
  become: true
