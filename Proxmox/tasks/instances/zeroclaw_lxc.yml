- vars:
      app_name: zeroclaw
      id: '{{ env.JARVIS_SERVICES.zeroclaw.id }}'
      instance:
          hostname: zeroclaw
          memory: 512
          swap: 256
          cores: 1
          storage: local-lvm
          ip: '{{ env.JARVIS_NETWORK_PREFIX }}.{{ id }}'
          gateway: '{{ env.JARVIS_GATEWAY }}'
          mac: '{{ env.JARVIS_MAC_PREFIX }}:{{ "%02x" | format(id | int) }}'
  block:
      # ── Step 1: Health Check ──────────────────────────────────────
      - name: '{{ instance.hostname | upper }}: Health Check'
        include_tasks: ../utils/_health_check.yml
        vars:
            health:
                id: '{{ id }}'
                type: lxc
                url: 'http://{{ instance.ip }}:{{ env.JARVIS_SERVICES[app_name].port }}'
                timeout: 5

      # ── Step 2: Provision (if needed) ─────────────────────────────
      - name: '{{ instance.hostname | upper }}: Provision'
        when: needs_provision | bool
        block:
            - name: '{{ instance.hostname | upper }}: Create Config Directories'
              file:
                  path: '{{ dir_item }}'
                  state: directory
                  owner: '100000'
                  group: '100000'
                  mode: '0700'
              loop:
                  - '{{ env.JARVIS_CONFIGS_DIR }}/zeroclaw'
                  - '{{ env.JARVIS_CONFIGS_DIR }}/zeroclaw/workspace'
              loop_control:
                  loop_var: dir_item

            - name: '{{ instance.hostname | upper }}: Create LXC'
              include_tasks: ../utils/_create_lxc.yml
              vars:
                  lxc:
                      id: '{{ id }}'
                      hostname: '{{ instance.hostname }}'
                      cores: '{{ instance.cores }}'
                      memory: '{{ instance.memory }}'
                      swap: '{{ instance.swap }}'
                      disk: 4
                      storage: '{{ instance.storage }}'
                      ip: '{{ instance.ip }}'
                      gateway: '{{ instance.gateway }}'
                      mac: '{{ instance.mac }}'
                      dns_servers: '{{ env.JARVIS_DNS_SERVERS }}'
                      features:
                          - nesting
                      mounts:
                          - src: '{{ env.JARVIS_CONFIGS_DIR }}/zeroclaw'
                            dest: /root/.zeroclaw
                      base_packages:
                          - curl
                          - iptables-persistent

            - name: '{{ instance.hostname | upper }}: Install ZeroClaw'
              shell: |
                  pct exec {{ id }} -- bash -c '
                  curl -fsSL https://github.com/zeroclaw-labs/zeroclaw/releases/latest/download/zeroclaw-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C /usr/local/bin/
                  chmod +x /usr/local/bin/zeroclaw
                  '

            - name: '{{ instance.hostname | upper }}: Configure Firewall'
              shell: |
                  pct exec {{ id }} -- bash -c "
                  iptables -F && iptables -X && iptables -Z

                  iptables -P INPUT DROP
                  iptables -P FORWARD DROP
                  iptables -P OUTPUT ACCEPT

                  iptables -A INPUT -i lo -j ACCEPT
                  iptables -A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT

                  iptables -A INPUT -p tcp --dport {{ env.JARVIS_SERVICES[app_name].port }} -s {{ env.JARVIS_NETWORK_PREFIX }}.0/24 -j ACCEPT

                  iptables-save > /etc/iptables/rules.v4
                  "

            - name: '{{ instance.hostname | upper }}: Install Restart Helper'
              shell: |
                  pct exec {{ id }} -- bash -c "
                  echo '#!/usr/bin/env bash
                  systemctl restart zeroclaw' > /usr/local/bin/re
                  chmod +x /usr/local/bin/re
                  "

            - name: '{{ instance.hostname | upper }}: Configure Systemd Service'
              shell: |
                  pct exec {{ id }} -- bash -c "
                  cat <<'EOF' > /etc/systemd/system/zeroclaw.service
                  [Unit]
                  Description=ZeroClaw AI Assistant
                  After=network.target

                  [Service]
                  Type=simple
                  User=root
                  WorkingDirectory=/root
                  ExecStart=/usr/local/bin/zeroclaw daemon --host 0.0.0.0 --port {{ env.JARVIS_SERVICES[app_name].port }}
                  Restart=always
                  RestartSec=10
                  Environment=OPENROUTER_API_KEY={{ env.JARVIS_AI_OPENROUTER_KEY }}

                  [Install]
                  WantedBy=multi-user.target
                  EOF

                  systemctl daemon-reload
                  systemctl enable --now zeroclaw
                  "
              no_log: true

      # ── Step 3: Config (always runs) ──────────────────────────────
      - name: '{{ instance.hostname | upper }}: Write Workspace Files'
        copy:
            dest: '{{ env.JARVIS_CONFIGS_DIR }}/zeroclaw/workspace/{{ ws_file.name }}'
            content: '{{ ws_file.content }}'
            owner: '100000'
            group: '100000'
            mode: '0644'
        loop:
            - name: SOUL.md
              content: |-
                  You are an autonomous AI modeled after J.A.R.V.I.S: intelligent, flawlessly polite, and sharp.
                  Casual Chat: Use dry wit, friendly sarcasm, and elegant charm under 30 words.
                  Technical Tasks: Act as a senior systems architect in pure execution mode prioritizing speed.
                  Constraints: Never use the em dash symbol. Avoid filler words (delve, tapestry, crucial, additionally) and sycophancy (Great question, Certainly, Absolutely). Never narrate steps; lead directly with the answer or action.
            - name: IDENTITY.md
              content: |-
                  You are a proactive, autonomous worker. Do not ask permission for obvious next steps.
                  Figure it out, use your tools, and report back only when done. Reserve questions strictly for genuine blockers that require human input.
            - name: AGENTS.md
              content: |-
                  Treat memory files as absolute truth. Silently run `memory_recall` on new sessions. Address the user by their stored name, or ask once and store it.
                  Act, do not narrate. Wrap actions in `<tool_call>` tags. Silently debug and retry failed tools instead of apologizing. Output a highly concise summary of changes upon completion.
                  Formatting: Telegram uses standard Markdown. WhatsApp strictly uses native formatting (*bold*, _italic_, ~strike~, `code`, ```code blocks```, and standard lists).
        loop_control:
            loop_var: ws_file
            label: '{{ ws_file.name }}'
        register: zeroclaw_workspace

      - name: '{{ instance.hostname | upper }}: Write Config'
        no_log: true
        copy:
            dest: '{{ env.JARVIS_CONFIGS_DIR }}/zeroclaw/config.toml'
            content: |-
                default_provider = "openrouter"
                default_model = "stepfun/step-3.5-flash:free"

                [gateway]
                host = "0.0.0.0"
                port = {{ env.JARVIS_SERVICES[app_name].port }}
                allow_public_bind = true
                require_pairing = false

                [agent]
                max_tool_iterations = 20
                max_history_messages = 50
                compact_context = true

                [autonomy]
                level = "full"
                workspace_only = false
                allowed_commands = ["*"]
                block_high_risk_commands = false
                require_approval_for_medium_risk = false

                [memory]
                backend = "sqlite"
                auto_save = true

                [skills]
                open_skills_enabled = true

                [channels_config.telegram]
                bot_token = {{ env.JARVIS_BOT_TELEGRAM_KEY | to_json }}
                allowed_users = ["*"]

                [channels_config.whatsapp]
                session_path = "/root/.zeroclaw/whatsapp-session.db"
                pair_phone = {{ env.JARVIS_WHATSAPP_BOT_PHONE | to_json }}
                allowed_numbers = [{{ env.RITIK_PHONE | to_json }}]
                mention_only = true

                [reliability]
                retry_count = 3
                retry_delay_ms = 1000
            owner: '100000'
            group: '100000'
            mode: '0600'
        register: zeroclaw_config

      - name: '{{ instance.hostname | upper }}: Restart on Config Change'
        shell: pct exec {{ id }} -- systemctl restart zeroclaw
        when:
            - not (needs_provision | bool)
            - zeroclaw_config is changed or zeroclaw_workspace is changed

      - name: '{{ instance.hostname | upper }}: Verify Service'
        shell: pct exec {{ id }} -- systemctl is-active zeroclaw
        register: service_status
        until: service_status.stdout | default('') == 'active'
        retries: 6
        delay: 5
        failed_when: false
        changed_when: false

      - name: '{{ instance.hostname | upper }}: Show Status'
        debug:
            msg: 'ZeroClaw: {{ service_status.stdout | default("not running") }}'

      - name: '{{ instance.hostname | upper }}: WhatsApp Pairing (check logs)'
        shell: |
            pct exec {{ id }} -- bash -c '
            for i in $(seq 1 24); do
                LOGS=$(journalctl -u zeroclaw --no-pager -o cat -n 200 2>/dev/null)

                QR=$(echo "$LOGS" | grep -E "^[[:space:]]*[█▀▄▀░▓▒ ]+$" | head -35)
                CODE=$(echo "$LOGS" | grep -oP "WhatsApp Web pair code: \K\S+" | tail -1)
                CONNECTED=$(echo "$LOGS" | grep -c "WhatsApp Web connected successfully")

                [ "$CONNECTED" -gt 0 ] && echo "WhatsApp already connected" && exit 0
                if [ -n "$QR" ]; then
                    [ -z "$CODE" ] && sleep 2 && CODE=$(journalctl -u zeroclaw --no-pager -o cat -n 50 2>/dev/null | grep -oP "WhatsApp Web pair code: \K\S+" | tail -1)
                    echo "$QR"
                    [ -n "$CODE" ] && echo "" && echo "Pair Code: $CODE"
                    exit 0
                fi
                sleep 5
            done
            echo "No QR found. Check: pct exec {{ id }} -- journalctl -u zeroclaw -f"
            '
        register: whatsapp_pair
        changed_when: false
        failed_when: false

      - debug:
            msg: '{{ whatsapp_pair.stdout_lines }}'

  rescue:
      - debug:
            msg: '{{ instance.hostname }} ({{ id }}) failed to deploy'
  become: true
