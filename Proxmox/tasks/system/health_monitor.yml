---
- set_fact:
      prefix: 'HEALTH MONITOR'

- name: '{{ prefix }}: Create drop-in directories'
  file:
      path: '/etc/systemd/system/{{ item }}.service.d'
      state: directory
  loop: [pvedaemon, pvestatd, pve-cluster, pveproxy]

- name: '{{ prefix }}: Write restart policy drop-ins'
  copy:
      dest: '/etc/systemd/system/{{ item }}.service.d/jarvis-restart.conf'
      content: |
          [Unit]
          StartLimitIntervalSec=300
          StartLimitBurst=3
          [Service]
          Restart=on-failure
          RestartSec=5s
  loop: [pvedaemon, pvestatd, pve-cluster, pveproxy]

- name: '{{ prefix }}: Reload systemd'
  systemd: { daemon_reload: true }
