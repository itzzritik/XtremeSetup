---
- set_fact:
      prefix: 'WATCHDOG'

- name: '{{ prefix }}: Check for hardware watchdog device'
  stat: { path: /dev/watchdog }
  register: hw_watchdog

- name: '{{ prefix }}: Load softdog module (fallback)'
  when: not hw_watchdog.stat.exists
  block:
      - name: '{{ prefix }}: Load softdog module'
        modprobe: { name: softdog, state: present }

      - name: '{{ prefix }}: Persist softdog across reboots'
        lineinfile: { path: /etc/modules, line: softdog, state: present, create: true }

# ── Circuit Breaker ────────────────────────────────────────────────────────────
- name: '{{ prefix }}: Create watchdog-mux service drop-in directory'
  file:
      path: /etc/systemd/system/watchdog-mux.service.d
      state: directory

- name: '{{ prefix }}: Attach bootloop circuit breaker to Proxmox watchdog-mux'
  copy:
      dest: /etc/systemd/system/watchdog-mux.service.d/circuit-breaker.conf
      content: |
          [Service]
          # Log boot time. If 5 boots happen in < 1800s (30m), trigger safe poweroff.
          ExecStartPre=/bin/bash -c 'f="{{ env.JARVIS_LOGS_DIR }}/watchdog/boots"; date +%s >> $f; tail -n 5 $f > $f.tmp && mv $f.tmp $f; [ $(wc -l < $f) -lt 5 ] || [ $(( $(date +%s) - $(head -n 1 $f) )) -ge 1800 ] || { systemctl poweroff; exit 1; }'

- name: '{{ prefix }}: Restart Proxmox watchdog-mux'
  systemd: { name: watchdog-mux, state: restarted, daemon_reload: true }
