---
- set_fact:
      prefix: 'WATCHDOG'

- name: '{{ prefix }}: Load softdog module globally'
  modprobe: { name: softdog, state: present }

- name: '{{ prefix }}: Persist softdog module across reboots'
  lineinfile: { path: /etc/modules, line: softdog, state: present, create: true }

- name: '{{ prefix }}: Configure Systemd Hardware Protection'
  lineinfile:
      path: /etc/systemd/system.conf
      regexp: '^#?RuntimeWatchdogSec='
      line: 'RuntimeWatchdogSec=60'
  register: systemd_wd

- name: '{{ prefix }}: Apply Systemd Config'
  systemd: { daemon_reload: true }
  when: systemd_wd.changed

- name: '{{ prefix }}: Configure Kernel Panic Auto-Reboot'
  sysctl: { name: kernel.panic, value: '10', state: present, sysctl_set: yes }

- name: '{{ prefix }}: Configure Kernel Oops Auto-Reboot'
  sysctl: { name: kernel.panic_on_oops, value: '1', state: present, sysctl_set: yes }

- name: '{{ prefix }}: Remove old watchdog-mux logic'
  file: { path: /etc/systemd/system/watchdog-mux.service.d, state: absent }

- name: '{{ prefix }}: Create circuit breaker script'
  copy:
      dest: /usr/local/bin/jarvis-watchdog-breaker.sh
      mode: '0755'
      content: |
          #!/bin/bash
          f="{{ env.JARVIS_LOGS_DIR }}/watchdog/boots"
          date +%s >> "$f"
          grep -E "^[0-9]+$" "$f" | tail -n 5 > "${f}.tmp" && mv "${f}.tmp" "$f"
          if [ "$(wc -l < "$f")" -ge 5 ] && [ $(( $(date +%s) - $(head -n 1 "$f") )) -lt 1800 ]; then
             systemctl poweroff
             exit 1
          fi
          exit 0

- name: '{{ prefix }}: Create Circuit Breaker Service'
  copy:
      dest: /etc/systemd/system/jarvis-circuit-breaker.service
      content: |
          [Unit]
          Description=Jarvis Anti-Bootloop Circuit Breaker
          After=local-fs.target
          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/jarvis-watchdog-breaker.sh
          [Install]
          WantedBy=multi-user.target
  register: cb_service

- name: '{{ prefix }}: Enable Circuit Breaker Service'
  systemd: { name: jarvis-circuit-breaker, enabled: true, state: started, daemon_reload: true }
