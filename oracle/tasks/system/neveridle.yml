---
- vars:
      app_name: neveridle
      config:
          root: '{{ env.JARVIS_CONFIGS_DIR }}/{{ app_name }}'
  block:
      - name: '{{ app_name | upper }}: Check Installation'
        stat:
            path: /usr/local/bin/{{ app_name }}
        register: neveridle_check

      - name: '{{ app_name | upper }}: Install'
        get_url:
            url: 'https://github.com/layou233/NeverIdle/releases/latest/download/NeverIdle-linux-arm64'
            dest: /usr/local/bin/{{ app_name }}
            mode: '0755'
        when: not neveridle_check.stat.exists

      - name: '{{ app_name | upper }}: Configure Directories'
        file:
            path: '{{ config.root }}/logs'
            state: directory
            mode: '0755'
            owner: ubuntu
            group: ubuntu
            recurse: true

      - name: '{{ app_name | upper }}: Create Logger'
        copy:
            dest: '{{ config.root }}/logger.sh'
            content: |
                #!/bin/bash
                LOG_DIR="{{ config.root }}/logs"
                TODAY=$(date +%d-%^b-%Y)
                LOG="$LOG_DIR/$TODAY.log"
                PREV_NET=0

                summarize() {
                    [ ! -f "$LOG" ] && return
                    AVG_CPU=$(grep -o 'C:[0-9]*' "$LOG" | grep -o '[0-9]*' | awk '{s+=$1;n++} END {if(n>0) printf "%.0f",s/n; else print 0}')
                    AVG_MEM=$(grep -o 'M:[0-9]*' "$LOG" | grep -o '[0-9]*' | awk '{s+=$1;n++} END {if(n>0) printf "%.0f",s/n; else print 0}')
                    SAMPLES=$(grep -c 'C:' "$LOG" || true)
                    CPU_OK="N"; [ "${AVG_CPU:-0}" -ge 20 ] 2>/dev/null && CPU_OK="Y"
                    MEM_OK="N"; [ "${AVG_MEM:-0}" -ge 20 ] 2>/dev/null && MEM_OK="Y"
                    if [ "$CPU_OK" = "Y" ] || [ "$MEM_OK" = "Y" ]; then S="PASS"; else S="FAIL"; fi
                    {
                        echo "═══════════════════════════════════════"
                        echo "  SUMMARY — $TODAY — $S"
                        echo "═══════════════════════════════════════"
                        echo "  CPU:      ${AVG_CPU}% avg  ($CPU_OK)"
                        echo "  Memory:   ${AVG_MEM}% avg  ($MEM_OK)"
                        echo "  Samples:  $SAMPLES"
                        echo "═══════════════════════════════════════"
                        echo ""
                        cat "$LOG"
                    } > "$LOG_DIR/${TODAY}_${S}.log"
                    rm -f "$LOG"
                    find "$LOG_DIR" -name "*.log" -mtime +180 -delete
                }

                while true; do
                    D=$(date +%d-%^b-%Y)
                    if [ "$D" != "$TODAY" ]; then
                        summarize; TODAY=$D; LOG="$LOG_DIR/$TODAY.log"; PREV_NET=0
                    fi

                    CPU=$(vmstat 1 2 2>/dev/null | tail -1 | awk '{print int(100-$15)}'); [ -z "$CPU" ] && CPU=0
                    MEM=$(free | awk '/Mem:/{printf "%.0f",$3/$2*100}')
                    CN=$(awk 'NR>2{r+=$2;t+=$10}END{print int((r+t)/1024)}' /proc/net/dev 2>/dev/null)
                    [ "$PREV_NET" -gt 0 ] && [ "$CN" -ge "$PREV_NET" ] && NET=$(((CN-PREV_NET)/1024)) || NET=0
                    PREV_NET=$CN

                    echo "[$(date +%H:%M:%S)] C:${CPU}% M:${MEM}% N:${NET}MB/min" >> "$LOG"
                    sleep 60
                done
            mode: '0755'
            owner: ubuntu
            group: ubuntu
        register: logger_script

      - name: '{{ app_name | upper }}: Create NeverIdle Service'
        copy:
            dest: /etc/systemd/system/{{ app_name }}.service
            content: |
                [Unit]
                Description=NeverIdle (Oracle anti-reclaim)
                After=network.target

                [Service]
                Type=simple
                Nice=19
                ExecStart=/usr/local/bin/{{ app_name }} -cp 0.2 -m 2 -n 4h
                Restart=always
                RestartSec=60

                [Install]
                WantedBy=multi-user.target
            mode: '0644'
        register: neveridle_service

      - name: '{{ app_name | upper }}: Create Logger Service'
        copy:
            dest: /etc/systemd/system/{{ app_name }}-logger.service
            content: |
                [Unit]
                Description=NeverIdle Resource Logger

                [Service]
                Type=simple
                Nice=19
                ExecStart={{ config.root }}/logger.sh
                Restart=always
                RestartSec=60

                [Install]
                WantedBy=multi-user.target
            mode: '0644'
        register: logger_service

      - name: '{{ app_name | upper }}: Daemon Reload'
        systemd:
            daemon_reload: true
        when: neveridle_service is changed or logger_service is changed

      - name: '{{ app_name | upper }}: Enable NeverIdle'
        systemd:
            name: '{{ app_name }}'
            state: "{{ 'restarted' if neveridle_service is changed else 'started' }}"
            enabled: true

      - name: '{{ app_name | upper }}: Enable Logger'
        systemd:
            name: '{{ app_name }}-logger'
            state: "{{ 'restarted' if (logger_service is changed or logger_script is changed) else 'started' }}"
            enabled: true
