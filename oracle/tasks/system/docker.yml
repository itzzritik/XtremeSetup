---
- vars:
      app_name: docker
  block:
      - name: '{{ app_name | upper }}: Check if Docker is Installed'
        command: docker --version
        register: docker_check
        failed_when: false
        changed_when: false

      - name: '{{ app_name | upper }}: Add Docker APT Repository'
        when: docker_check.rc != 0
        shell: |
            install -m 0755 -d /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --batch --yes --dearmor -o /etc/apt/keyrings/docker.gpg
            chmod a+r /etc/apt/keyrings/docker.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
            apt-get update
        args:
            creates: /etc/apt/sources.list.d/docker.list

      - name: '{{ app_name | upper }}: Install Docker Engine'
        apt:
            name:
                - docker-ce
                - docker-ce-cli
                - containerd.io
                - docker-buildx-plugin
                - docker-compose-plugin
            state: present
        when: docker_check.rc != 0

      - name: '{{ app_name | upper }}: Enable and Start Docker'
        systemd:
            name: docker
            enabled: yes
            state: started

      - name: '{{ app_name | upper }}: Add Ubuntu User to Docker Group'
        user:
            name: ubuntu
            groups: docker
            append: yes
