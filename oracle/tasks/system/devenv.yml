---
- vars:
      app_name: devenv
      config:
          root: '{{ env.JARVIS_CONFIGS_DIR }}/{{ app_name }}'
  block:
      - name: '{{ app_name | upper }}: Configure Directories'
        file:
            path: '{{ item }}'
            state: directory
            mode: '0755'
            owner: ubuntu
            group: ubuntu
        loop:
            - '{{ env.JARVIS_PROJECTS_DIR }}'
            - '{{ config.root }}'

      - name: '{{ app_name | upper }}: Write Environment Config'
        copy:
            dest: '{{ config.root }}/env.sh'
            content: |
                export OPENAI_API_KEY="{{ env.JARVIS_AI_OPENAI_KEY }}"
                alias cc="claude"
                alias code="code-server -r"
            mode: '0600'
            owner: ubuntu
            group: ubuntu
        no_log: true

      - name: '{{ app_name | upper }}: Source env in zshrc'
        blockinfile:
            path: /home/ubuntu/.zshrc
            marker: '# {mark} JARVIS'
            block: |
                [ -f {{ config.root }}/env.sh ] && source {{ config.root }}/env.sh
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Configure Git'
        community.general.git_config:
            name: '{{ git_item.key }}'
            value: '{{ git_item.value }}'
            scope: global
        loop:
            - { key: user.name, value: '{{ env.RITIK_NAME }}' }
            - { key: user.email, value: '{{ env.RITIK_EMAIL }}' }
        loop_control:
            loop_var: git_item
            label: '{{ git_item.key }}'
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Remind to login Claude Code'
        debug:
            msg: 'Run `claude login` as ubuntu user to authenticate Claude Code (uses subscription, not API key)'

      - name: '{{ app_name | upper }}: Anti-reclaim cron job'
        cron:
            name: 'Oracle anti-reclaim keepalive'
            minute: '*/30'
            job: 'nice -n 19 head -c 1M /dev/urandom | sha256sum > /dev/null 2>&1'
            user: ubuntu
