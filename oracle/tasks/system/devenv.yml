---
- vars:
      app_name: devenv
  block:
      - name: '{{ app_name | upper }}: Create Projects Directory'
        file:
            path: '{{ env.JARVIS_PROJECTS_DIR }}'
            state: directory
            mode: '0755'
            owner: ubuntu
            group: ubuntu

      - name: '{{ app_name | upper }}: Configure Shell Aliases'
        blockinfile:
            path: /home/ubuntu/.zshrc
            marker: '# {mark} JARVIS'
            block: |
                alias cc="claude"
                alias code="code-server -r"
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Remind to login Claude Code'
        debug:
            msg: 'Run `claude login` as ubuntu user to authenticate Claude Code (uses subscription, not API key)'
