---
- name: 'SYSCTL: Configure kernel parameters'
  ansible.posix.sysctl:
      name: '{{ item.key }}'
      value: '{{ item.value }}'
      state: present
      reload: true
  loop:
      - { key: fs.inotify.max_user_watches, value: '524288' }
      - { key: fs.inotify.max_user_instances, value: '256' }
      - { key: vm.swappiness, value: '10' }
  loop_control:
      label: '{{ item.key }}={{ item.value }}'

- name: 'SYSCTL: Check Swap'
  command: swapon --show
  register: swap_check
  changed_when: false
  failed_when: false

- name: 'SYSCTL: Check Swapfile Exists'
  stat:
      path: /swapfile
  register: swapfile_stat

- name: 'SYSCTL: Create Swapfile'
  block:
      - name: Allocate Swapfile
        command: fallocate -l 4G /swapfile
        args:
            creates: /swapfile

      - name: Set Permissions
        file:
            path: /swapfile
            mode: '0600'

      - name: Format Swapfile
        command: mkswap /swapfile
  when: not swapfile_stat.stat.exists

- name: 'SYSCTL: Enable Swap'
  command: swapon /swapfile
  when: "'/swapfile' not in swap_check.stdout"
  register: swapon_result
  failed_when: swapon_result.rc != 0 and 'busy' not in swapon_result.stderr
  changed_when: swapon_result.rc == 0

- name: 'SYSCTL: Add Swap to fstab'
  lineinfile:
      path: /etc/fstab
      line: '/swapfile swap swap defaults 0 0'
      state: present
