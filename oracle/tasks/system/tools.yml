---
- vars:
      nvm_init: 'export NVM_DIR=/home/ubuntu/.nvm && source /home/ubuntu/.nvm/nvm.sh'
  block:
      - name: 'TOOLS: Install apt packages'
        apt:
            name:
                - zsh
                - git
                - build-essential
                - curl
                - unzip
                - htop
                - jq
            state: present

      - name: 'TOOLS: Set zsh as default shell'
        user:
            name: ubuntu
            shell: /usr/bin/zsh

      - name: 'TOOLS: Check oh-my-zsh'
        stat:
            path: /home/ubuntu/.oh-my-zsh
        register: omz_check

      - name: 'TOOLS: Install oh-my-zsh'
        shell: >
            curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
            | sh -s -- --unattended
        when: not omz_check.stat.exists
        become: true
        become_user: ubuntu

      - name: 'TOOLS: Configure oh-my-zsh plugins'
        lineinfile:
            path: /home/ubuntu/.zshrc
            regexp: '^plugins='
            line: 'plugins=(git z)'
        become: true
        become_user: ubuntu

      - name: 'TOOLS: Check nvm'
        stat:
            path: /home/ubuntu/.nvm/nvm.sh
        register: nvm_check

      - name: 'TOOLS: Install nvm'
        shell: >
            curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/master/install.sh | bash
        when: not nvm_check.stat.exists
        become: true
        become_user: ubuntu

      - name: 'TOOLS: Ensure nvm sourced in zshrc'
        blockinfile:
            path: /home/ubuntu/.zshrc
            marker: '# {mark} NVM'
            block: |
                export NVM_DIR="$HOME/.nvm"
                [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
                [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"
        become: true
        become_user: ubuntu

      - name: 'TOOLS: Install Node.js LTS'
        shell: |
            {{ nvm_init }}
            nvm install --lts
            nvm alias default lts/*
        args:
            executable: /bin/bash
        register: node_install
        changed_when: "'is already installed' not in node_install.stderr"
        become: true
        become_user: ubuntu

      - name: 'TOOLS: Install Global npm Packages'
        shell: '{{ nvm_init }} && npm install -g {{ npm_item }}'
        args:
            executable: /bin/bash
        loop:
            - typescript
            - pnpm
            - yarn
            - '@anthropic-ai/claude-code'
            - '@openai/codex'
        loop_control:
            loop_var: npm_item
        become: true
        become_user: ubuntu
