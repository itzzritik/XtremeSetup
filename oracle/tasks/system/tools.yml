---
- vars:
      app_name: tools
      fnm_init: 'export PATH=/home/linuxbrew/.linuxbrew/bin:$PATH && eval "$(fnm env --shell bash)"'
  block:
      - name: '{{ app_name | upper }}: Install apt packages'
        apt:
            name:
                - zsh
                - git
                - build-essential
                - curl
                - unzip
                - htop
                - jq
                - procps
                - file
                - bubblewrap
                - tmux
                - sqlite3
            state: present

      - name: '{{ app_name | upper }}: Enable unprivileged user namespace for bubblewrap'
        sysctl:
            name: '{{ ns_item.key }}'
            value: '{{ ns_item.value }}'
            sysctl_set: true
        loop:
            - { key: kernel.apparmor_restrict_unprivileged_userns, value: '0' }
            - { key: kernel.unprivileged_userns_clone, value: '1' }
        loop_control:
            loop_var: ns_item
            label: '{{ ns_item.key }}'
        become: true
        failed_when: false

      - name: '{{ app_name | upper }}: Set zsh as default shell'
        user:
            name: ubuntu
            shell: /usr/bin/zsh

      - name: '{{ app_name | upper }}: Check oh-my-zsh'
        stat:
            path: /home/ubuntu/.oh-my-zsh
        register: omz_check

      - name: '{{ app_name | upper }}: Install oh-my-zsh'
        shell: >
            curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
            | sh -s -- --unattended
        when: not omz_check.stat.exists
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Configure oh-my-zsh plugins'
        lineinfile:
            path: /home/ubuntu/.zshrc
            regexp: '^plugins='
            line: 'plugins=(git z fzf zsh-autosuggestions zsh-syntax-highlighting)'
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Set FZF_BASE for oh-my-zsh fzf plugin'
        lineinfile:
            path: /home/ubuntu/.zshrc
            regexp: '^export FZF_BASE='
            line: 'export FZF_BASE=/home/linuxbrew/.linuxbrew/opt/fzf'
            insertbefore: '^source \$ZSH/oh-my-zsh.sh'
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Clone zsh plugins'
        git:
            repo: 'https://github.com/zsh-users/{{ zsh_plugin }}'
            dest: '/home/ubuntu/.oh-my-zsh/custom/plugins/{{ zsh_plugin }}'
            depth: 1
        loop:
            - zsh-autosuggestions
            - zsh-syntax-highlighting
        loop_control:
            loop_var: zsh_plugin
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Check brew'
        stat:
            path: /home/linuxbrew/.linuxbrew/bin/brew
        register: brew_check

      - name: '{{ app_name | upper }}: Install brew'
        shell: NONINTERACTIVE=1 bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
        when: not brew_check.stat.exists
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Configure brew'
        blockinfile:
            path: /home/ubuntu/.zshrc
            marker: '# {mark} BREW'
            block: |
                eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Install Homebrew Packages'
        shell: /home/linuxbrew/.linuxbrew/bin/brew install {{ brew_item }}
        loop:
            - gh
            - fzf
            - eza
            - just
            - go
            - golangci-lint
            - doppler
            - fnm
        loop_control:
            loop_var: brew_item
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Ensure fnm sourced in zshrc'
        blockinfile:
            path: /home/ubuntu/.zshrc
            marker: '# {mark} FNM'
            block: |
                eval "$(fnm env --use-on-cd --shell zsh)"
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Install Node.js LTS'
        shell: |
            {{ fnm_init }}
            fnm install --lts
            fnm use lts-latest
            fnm default "$(fnm current)"
        args:
            executable: /bin/bash
        register: node_install
        changed_when: "'already installed' not in node_install.stderr"
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Install Global npm Packages'
        shell: '{{ fnm_init }} && npm install -g {{ npm_item }}'
        args:
            executable: /bin/bash
        loop:
            - typescript
            - pnpm
            - yarn
            - '@anthropic-ai/claude-code'
            - '@openai/codex'
            - opencode-ai
        loop_control:
            loop_var: npm_item
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Check bun'
        stat:
            path: /home/ubuntu/.bun/bin/bun
        register: bun_check

      - name: '{{ app_name | upper }}: Install bun'
        shell: 'curl -fsSL https://bun.sh/install | bash'
        args:
            executable: /bin/bash
        when: not bun_check.stat.exists
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Ensure bun sourced in zshrc'
        blockinfile:
            path: /home/ubuntu/.zshrc
            marker: '# {mark} BUN'
            block: |
                export BUN_INSTALL="$HOME/.bun"
                export PATH="$BUN_INSTALL/bin:$PATH"
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Configure Shell Aliases'
        blockinfile:
            path: /home/ubuntu/.zshrc
            marker: '# {mark} JARVIS'
            block: |
                export EDITOR="code --wait"
                alias cc="claude"
                alias hre="sudo systemctl restart hermes"
                alias t="tmux new-session -A -s main"
                alias ls="eza --icons"
                alias ll="eza -la --icons --git"
                vscode() {
                  local uri="vscode://vscode-remote/ssh-remote+{{ ansible_user }}@{{ ansible_host }}$(realpath ${1:-.})?windowId=_blank"
                  ${BROWSER:-echo} "$uri"
                }
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Configure tmux'
        blockinfile:
            path: /home/ubuntu/.tmux.conf
            marker: '# {mark} JARVIS'
            create: true
            mode: '0644'
            block: |
                # Behavior
                set -g mouse on
                setw -g monitor-activity on
                set -g visual-activity off
                set -sg escape-time 0
                set -g history-limit 50000

                # Saner indexing
                set -g base-index 1
                setw -g pane-base-index 1
                set -g renumber-windows on

                # Truecolor passthrough
                set -g default-terminal "tmux-256color"
                set -ga terminal-overrides ",xterm-256color:Tc"

                # Window naming: folder:command
                set -g automatic-rename on
                set -g automatic-rename-format "#{b:pane_current_path}:#{pane_current_command}"

                # Status bar palette
                set -g status-style "bg=black,fg=white"
                set -g status-left ""
                set -g status-left-length 0
                set -g status-right-length 100
                set -g status-interval 5

                # Window list
                setw -g window-status-format "  #I:#W  "
                setw -g window-status-current-format "#[fg=black,bg=green,bold]  #I:#W  #[fg=white,bg=black]"
                setw -g window-status-style "fg=#888888"
                setw -g window-status-activity-style "fg=yellow,bold"

                # Right side — pipe-separated sections
                set -g status-right "#{?client_prefix,#[fg=black#,bg=red#,bold] PFX #[fg=white#,bg=black] #[fg=#444444]│ ,}#[fg=yellow] RAM #(awk '/MemAvailable/{a=$2}/MemTotal/{t=$2}END{printf \"%.0f\", (1-a/t)*100}' /proc/meminfo)%% #[fg=#444444]│#[fg=magenta] CPU #(awk -v c=$(nproc) '{printf \"%.0f\", $1*100/c}' /proc/loadavg)%% #[fg=#444444]│#[fg=cyan] %l:%M %p #[fg=#444444]│#[fg=black,bg=green,bold] + new #[fg=white,bg=black] "

                # Bindings
                bind -n MouseDown1StatusRight new-window -c "#{pane_current_path}"
                bind -n MouseDown3Status kill-window -t '{mouse}'
                bind c new-window -c "#{pane_current_path}"
                bind '"' split-window -v -c "#{pane_current_path}"
                bind % split-window -h -c "#{pane_current_path}"
                bind r source-file ~/.tmux.conf \; display-message "reloaded"
        become: true
        become_user: ubuntu
