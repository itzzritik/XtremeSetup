---
- vars:
      app_name: tools
      nvm_init: 'export NVM_DIR=/home/ubuntu/.nvm && source /home/ubuntu/.nvm/nvm.sh'
  block:
      - name: '{{ app_name | upper }}: Install apt packages'
        apt:
            name:
                - zsh
                - git
                - build-essential
                - curl
                - unzip
                - htop
                - jq
                - procps
                - file
                - bubblewrap
                - tmux
            state: present

      - name: '{{ app_name | upper }}: Enable unprivileged user namespace for bubblewrap'
        sysctl:
            name: kernel.apparmor_restrict_unprivileged_userns
            value: '0'
            state: present
            sysctl_set: true
        become: true
        ignore_errors: true

      - name: '{{ app_name | upper }}: Enable unprivileged user namespace clone for bubblewrap'
        sysctl:
            name: kernel.unprivileged_userns_clone
            value: '1'
            state: present
            sysctl_set: true
        become: true
        ignore_errors: true

      - name: '{{ app_name | upper }}: Set zsh as default shell'
        user:
            name: ubuntu
            shell: /usr/bin/zsh

      - name: '{{ app_name | upper }}: Check oh-my-zsh'
        stat:
            path: /home/ubuntu/.oh-my-zsh
        register: omz_check

      - name: '{{ app_name | upper }}: Install oh-my-zsh'
        shell: >
            curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
            | sh -s -- --unattended
        when: not omz_check.stat.exists
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Configure oh-my-zsh plugins'
        lineinfile:
            path: /home/ubuntu/.zshrc
            regexp: '^plugins='
            line: 'plugins=(git z fzf zsh-autosuggestions zsh-syntax-highlighting)'
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Set FZF_BASE for oh-my-zsh fzf plugin'
        lineinfile:
            path: /home/ubuntu/.zshrc
            regexp: '^export FZF_BASE='
            line: 'export FZF_BASE=/home/linuxbrew/.linuxbrew/opt/fzf'
            insertbefore: '^source \$ZSH/oh-my-zsh.sh'
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Clone zsh-autosuggestions'
        git:
            repo: https://github.com/zsh-users/zsh-autosuggestions
            dest: /home/ubuntu/.oh-my-zsh/custom/plugins/zsh-autosuggestions
            depth: 1
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Clone zsh-syntax-highlighting'
        git:
            repo: https://github.com/zsh-users/zsh-syntax-highlighting
            dest: /home/ubuntu/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting
            depth: 1
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Check nvm'
        stat:
            path: /home/ubuntu/.nvm/nvm.sh
        register: nvm_check

      - name: '{{ app_name | upper }}: Install nvm'
        shell: >
            curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/master/install.sh | bash
        when: not nvm_check.stat.exists
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Ensure nvm sourced in zshrc'
        blockinfile:
            path: /home/ubuntu/.zshrc
            marker: '# {mark} NVM'
            block: |
                export NVM_DIR="$HOME/.nvm"
                [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
                [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Install Node.js LTS'
        shell: |
            {{ nvm_init }}
            nvm install --lts
            nvm alias default lts/*
        args:
            executable: /bin/bash
        register: node_install
        changed_when: "'is already installed' not in node_install.stderr"
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Install Global npm Packages'
        shell: '{{ nvm_init }} && npm install -g {{ npm_item }}'
        args:
            executable: /bin/bash
        loop:
            - typescript
            - pnpm
            - yarn
            - '@anthropic-ai/claude-code'
            - '@openai/codex'
            - opencode-ai
        loop_control:
            loop_var: npm_item
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Check brew'
        stat:
            path: /home/linuxbrew/.linuxbrew/bin/brew
        register: brew_check

      - name: '{{ app_name | upper }}: Install brew'
        shell: NONINTERACTIVE=1 bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
        when: not brew_check.stat.exists
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Configure brew'
        blockinfile:
            path: /home/ubuntu/.zshrc
            marker: '# {mark} BREW'
            block: |
                eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Install Homebrew Packages'
        shell: /home/linuxbrew/.linuxbrew/bin/brew install {{ brew_item }}
        loop:
            - gh
            - fzf
            - eza
        loop_control:
            loop_var: brew_item
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Configure Shell Aliases'
        blockinfile:
            path: /home/ubuntu/.zshrc
            marker: '# {mark} JARVIS'
            block: |
                export EDITOR="code-server --wait"
                alias cc="claude"
                alias code="code-server"
                alias hre="sudo systemctl restart hermes"
                alias t="tmux new-session -A -s main"
                alias ls="eza --icons"
                alias ll="eza -la --icons --git"
                vscode() {
                  local uri="vscode://vscode-remote/ssh-remote+{{ ansible_user }}@{{ ansible_host }}$(realpath ${1:-.})?windowId=_blank"
                  ${BROWSER:-echo} "$uri"
                }
        become: true
        become_user: ubuntu
