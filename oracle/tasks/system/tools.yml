---
- vars:
      app_name: tools
      fnm_init: 'export PATH=$HOME/.local/share/fnm:$PATH && eval "$(fnm env --shell bash)"'
  block:
      - name: '{{ app_name | upper }}: Install apt packages'
        apt:
            name:
                - zsh
                - git
                - build-essential
                - curl
                - unzip
                - htop
                - jq
                - procps
                - file
                - bubblewrap
                - tmux
                - sqlite3
            state: present

      - name: '{{ app_name | upper }}: Enable unprivileged user namespace for bubblewrap'
        sysctl:
            name: '{{ ns_item.key }}'
            value: '{{ ns_item.value }}'
            sysctl_set: true
        loop:
            - { key: kernel.apparmor_restrict_unprivileged_userns, value: '0' }
            - { key: kernel.unprivileged_userns_clone, value: '1' }
        loop_control:
            loop_var: ns_item
            label: '{{ ns_item.key }}'
        become: true
        failed_when: false

      - name: '{{ app_name | upper }}: Set zsh as default shell'
        user:
            name: ubuntu
            shell: /usr/bin/zsh

      - name: '{{ app_name | upper }}: Check oh-my-zsh'
        stat:
            path: /home/ubuntu/.oh-my-zsh
        register: omz_check

      - name: '{{ app_name | upper }}: Install oh-my-zsh'
        shell: >
            curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
            | sh -s -- --unattended
        when: not omz_check.stat.exists
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Configure oh-my-zsh plugins'
        lineinfile:
            path: /home/ubuntu/.zshrc
            regexp: '^plugins='
            line: 'plugins=(git z zsh-autosuggestions zsh-syntax-highlighting)'
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Clone zsh plugins'
        git:
            repo: 'https://github.com/zsh-users/{{ zsh_plugin }}'
            dest: '/home/ubuntu/.oh-my-zsh/custom/plugins/{{ zsh_plugin }}'
            depth: 1
        loop:
            - zsh-autosuggestions
            - zsh-syntax-highlighting
        loop_control:
            loop_var: zsh_plugin
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Add GitHub CLI APT Repository'
        shell: |
            install -m 0755 -d /etc/apt/keyrings
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg -o /etc/apt/keyrings/githubcli-archive-keyring.gpg
            chmod a+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" > /etc/apt/sources.list.d/github-cli.list
            apt-get update
        args:
            creates: /etc/apt/sources.list.d/github-cli.list

      - name: '{{ app_name | upper }}: Add Doppler APT Repository'
        shell: curl -sLf --tlsv1.2 --proto "=https" --retry 3 https://packages.doppler.com/public/cli/setup.deb.sh | bash
        args:
            creates: /etc/apt/sources.list.d/doppler-cli.list
            executable: /bin/bash

      - name: '{{ app_name | upper }}: Add Eza APT Repository'
        shell: |
            install -m 0755 -d /etc/apt/keyrings
            curl -fsSL https://raw.githubusercontent.com/eza-community/eza/main/deb.asc | gpg --batch --yes --dearmor -o /etc/apt/keyrings/gierens.gpg
            chmod a+r /etc/apt/keyrings/gierens.gpg
            echo "deb [signed-by=/etc/apt/keyrings/gierens.gpg] http://deb.gierens.de stable main" > /etc/apt/sources.list.d/gierens.list
            apt-get update
        args:
            creates: /etc/apt/sources.list.d/gierens.list

      - name: '{{ app_name | upper }}: Install developer apt packages'
        apt:
            name:
                - gh
                - doppler
                - eza
            state: present

      - name: '{{ app_name | upper }}: Install Go'
        shell: |
            set -e
            GO_VERSION=$(curl -fsSL "https://go.dev/VERSION?m=text" | head -1)
            curl -fsSL "https://go.dev/dl/${GO_VERSION}.linux-$(dpkg --print-architecture).tar.gz" -o /tmp/go.tar.gz
            tar -C /usr/local -xzf /tmp/go.tar.gz
            rm /tmp/go.tar.gz
        args:
            creates: /usr/local/go/bin/go

      - name: '{{ app_name | upper }}: Install golangci-lint'
        shell: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b /usr/local/bin
        args:
            creates: /usr/local/bin/golangci-lint

      - name: '{{ app_name | upper }}: Install just'
        shell: |
            mkdir -p /home/ubuntu/.local/bin
            curl --proto "=https" --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /home/ubuntu/.local/bin
        args:
            creates: /home/ubuntu/.local/bin/just
            executable: /bin/bash
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Install Antigravity CLI'
        shell: set -o pipefail && curl -fsSL https://antigravity.google/cli/install.sh | bash -s -- --dir /home/ubuntu/.local/bin
        args:
            creates: /home/ubuntu/.local/bin/agy
            executable: /bin/bash
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Install fnm'
        shell: curl -fsSL https://fnm.vercel.app/install | bash -s -- --skip-shell
        args:
            creates: /home/ubuntu/.local/share/fnm/fnm
            executable: /bin/bash
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Ensure tool paths in zshrc'
        blockinfile:
            path: /home/ubuntu/.zshrc
            marker: '# {mark} PATHS'
            block: |
                export PATH="$HOME/.local/bin:/usr/local/go/bin:$HOME/.local/share/fnm:$PATH"
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Ensure fnm sourced in zshrc'
        blockinfile:
            path: /home/ubuntu/.zshrc
            marker: '# {mark} FNM'
            block: |
                eval "$(fnm env --use-on-cd --shell zsh)"
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Install Node.js LTS'
        shell: |
            {{ fnm_init }}
            fnm install --lts
            fnm use lts-latest
            fnm default "$(fnm current)"
        args:
            executable: /bin/bash
        register: node_install
        changed_when: "'already installed' not in node_install.stderr"
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Install Global npm Packages'
        shell: |
            {{ fnm_init }}
            BEFORE=$(npm list -g --depth=0 --json 2>/dev/null | jq -r '.dependencies["{{ npm_item }}"].version // "missing"')
            npm install -g {{ npm_item }} >/dev/null 2>&1
            AFTER=$(npm list -g --depth=0 --json 2>/dev/null | jq -r '.dependencies["{{ npm_item }}"].version // "missing"')
            if [ "$BEFORE" = "$AFTER" ]; then echo "noop $AFTER"; else echo "diff $BEFORE -> $AFTER"; fi
        args:
            executable: /bin/bash
        register: npm_install_result
        changed_when: "'diff' in npm_install_result.stdout"
        loop:
            - typescript
            - pnpm
            - yarn
            - '@anthropic-ai/claude-code'
            - '@openai/codex'
            - opencode-ai
        loop_control:
            loop_var: npm_item
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Check bun'
        stat:
            path: /home/ubuntu/.bun/bin/bun
        register: bun_check

      - name: '{{ app_name | upper }}: Install bun'
        shell: 'curl -fsSL https://bun.sh/install | bash'
        args:
            executable: /bin/bash
        when: not bun_check.stat.exists
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Ensure bun sourced in zshrc'
        blockinfile:
            path: /home/ubuntu/.zshrc
            marker: '# {mark} BUN'
            block: |
                export BUN_INSTALL="$HOME/.bun"
                export PATH="$BUN_INSTALL/bin:$PATH"
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Configure Shell Aliases'
        blockinfile:
            path: /home/ubuntu/.zshrc
            marker: '# {mark} JARVIS'
            block: |
                export EDITOR="code --wait"
                alias cc="claude"
                alias hre="sudo systemctl restart hermes"
                alias t="tmux new-session -A -s main"
                alias ls="eza --icons"
                alias ll="eza -la --icons --git"
                vscode() {
                  local uri="vscode://vscode-remote/ssh-remote+{{ ansible_user }}@{{ ansible_host }}$(realpath ${1:-.})?windowId=_blank"
                  ${BROWSER:-echo} "$uri"
                }
                agy-ide() {
                  local uri="antigravity-ide://vscode-remote/ssh-remote+{{ ansible_user }}@{{ ansible_host }}$(realpath ${1:-.})?windowId=_blank"
                  ${BROWSER:-echo} "$uri"
                }
                # Kill process(es) listening on one or more ports: kp 8080  |  kp 8080 8081 5555
                kp() {
                  [ $# -eq 0 ] && {
                    echo "kp - kill processes on given ports"
                    echo "Usage: kp <port>...   e.g. kp 8080 8081"
                    return 1
                  }
                  # ss, not lsof: lsof here has no IPv6 support and misses node/next-server (bind ::)
                  local port pids
                  pids=$(for port in "$@"; do ss -ltnpH "sport = :$port" 2>/dev/null; done | grep -oP 'pid=\K[0-9]+' | sort -u)
                  [ -z "$pids" ] && { echo "No processes on: $*"; return 0; }
                  echo "$pids" | xargs kill -9 && echo "Killed: $(echo $pids | tr '\n' ' ')"
                }
        become: true
        become_user: ubuntu

      - name: '{{ app_name | upper }}: Configure tmux'
        blockinfile:
            path: /home/ubuntu/.tmux.conf
            marker: '# {mark} JARVIS'
            create: true
            mode: '0644'
            block: |
                # Behavior
                set -g mouse on
                setw -g monitor-activity on
                set -g visual-activity off
                set -sg escape-time 0
                set -g history-limit 50000

                # Saner indexing
                set -g base-index 1
                setw -g pane-base-index 1
                set -g renumber-windows on

                # Truecolor passthrough
                set -g default-terminal "tmux-256color"
                set -ga terminal-overrides ",xterm-256color:Tc"

                # Window naming: folder:command
                set -g automatic-rename on
                set -g automatic-rename-format "#{b:pane_current_path}:#{pane_current_command}"

                # Status bar palette
                set -g status-style "bg=black,fg=white"
                set -g status-left ""
                set -g status-left-length 0
                set -g status-right-length 100
                set -g status-interval 5

                # Window list
                setw -g window-status-format " #I:#W "
                setw -g window-status-current-format "#[fg=black,bg=green,bold] #I:#W #[fg=white,bg=black]"
                setw -g window-status-style "fg=#888888"
                setw -g window-status-activity-style "fg=yellow,bold"

                # Right side — pipe-separated sections
                set -g status-right "#{?client_prefix,#[fg=black#,bg=red#,bold] PFX #[fg=white#,bg=black] #[fg=#444444]│ ,}#[fg=yellow] RAM #(awk '/MemAvailable/{a=$2}/MemTotal/{t=$2}END{printf \"%.0f\", (1-a/t)*100}' /proc/meminfo)%% #[fg=#444444]│#[fg=magenta] CPU #(awk -v c=$(nproc) '{printf \"%.0f\", $1*100/c}' /proc/loadavg)%% #[fg=#444444]│#[fg=cyan] %H:%M #[fg=black,bg=green,bold] + #[fg=white,bg=black] "

                # Bindings
                bind -n MouseDown1StatusRight new-window -c "#{pane_current_path}"
                bind -n MouseDown3Status kill-window -t '{mouse}'
                bind c new-window -c "#{pane_current_path}"
                bind '"' split-window -v -c "#{pane_current_path}"
                bind % split-window -h -c "#{pane_current_path}"
                bind r source-file ~/.tmux.conf \; display-message "reloaded"
        become: true
        become_user: ubuntu
