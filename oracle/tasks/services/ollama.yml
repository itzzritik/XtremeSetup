---
- vars:
      ollama_port: '11434'
      ollama_model: 'llama3.2'
  block:
      - name: 'OLLAMA: Check if Installed'
        command: ollama --version
        register: ollama_check
        failed_when: false
        changed_when: false

      - name: 'OLLAMA: Install'
        shell: curl -fsSL https://ollama.com/install.sh | sh
        when: ollama_check.rc != 0

      - name: 'OLLAMA: Create Systemd Override Directory'
        file:
            path: /etc/systemd/system/ollama.service.d
            state: directory
            mode: '0755'

      - name: 'OLLAMA: Configure Environment'
        copy:
            dest: /etc/systemd/system/ollama.service.d/override.conf
            content: |
                [Service]
                Environment="OLLAMA_HOST=127.0.0.1"
                Environment="OLLAMA_CONTEXT_LENGTH=32768"
            mode: '0644'
        register: ollama_override

      - name: 'OLLAMA: Reload and Restart'
        block:
            - systemd:
                  daemon_reload: yes
            - systemd:
                  name: ollama
                  state: restarted
        when: ollama_override is changed

      - name: 'OLLAMA: Restart Clean'
        systemd:
            name: ollama
            state: restarted
            enabled: yes

      - name: 'OLLAMA: Wait for API'
        uri:
            url: 'http://127.0.0.1:{{ ollama_port }}/api/tags'
            method: GET
            status_code: 200
        register: ollama_api
        until: ollama_api.status == 200
        retries: 12
        delay: 5

      - name: 'OLLAMA: Check Model'
        command: 'ollama show {{ ollama_model }} --modelfile'
        register: model_check
        failed_when: false
        changed_when: false

      - name: 'OLLAMA: Pull Model'
        command: 'ollama pull {{ ollama_model }}'
        when: model_check.rc != 0

      - name: 'OLLAMA: Preload Model'
        uri:
            url: 'http://127.0.0.1:{{ ollama_port }}/api/generate'
            method: POST
            body_format: json
            body:
                model: '{{ ollama_model }}'
                keep_alive: -1
            status_code: 200
            timeout: 120
        changed_when: false

      - name: 'OLLAMA: List Installed Models'
        command: ollama list
        register: installed_models
        changed_when: false

      - name: 'OLLAMA: Remove Unused Models'
        command: 'ollama rm {{ unused_model }}'
        loop: "{{ installed_models.stdout_lines[1:] | map('split') | map('first') | reject('match', '^' + ollama_model + '(:|$)') | list }}"
        loop_control:
            loop_var: unused_model
        when: installed_models.stdout_lines | length > 1
