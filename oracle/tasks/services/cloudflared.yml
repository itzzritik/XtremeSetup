---
- vars:
      app_name: cloudflared
  block:
      - name: '{{ app_name | upper }}: Check Installation'
        command: cloudflared --version
        register: cf_check
        failed_when: false
        changed_when: false

      - name: '{{ app_name | upper }}: Install'
        block:
            - name: Download deb
              get_url:
                  url: 'https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64.deb'
                  dest: /tmp/cloudflared.deb

            - name: Install deb
              apt:
                  deb: /tmp/cloudflared.deb

            - name: Cleanup
              file:
                  path: /tmp/cloudflared.deb
                  state: absent
        when: cf_check.rc != 0

      - name: '{{ app_name | upper }}: Install as Service'
        command: cloudflared service install {{ env.JARVIS_CF_TUNNEL_TOKEN }}
        args:
            creates: /etc/systemd/system/cloudflared.service

      - name: '{{ app_name | upper }}: Ensure Running'
        systemd:
            name: cloudflared
            state: started
            enabled: true
