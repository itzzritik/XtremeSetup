---
- vars:
      app_name: litellm
      litellm_port: '{{ env.services[app_name].port }}'
      ollama_port: '11434'
      config:
          root: '{{ env.JARVIS_DIR }}/configs/{{ app_name }}'
  block:
      - name: '{{ app_name | upper }}: Configure Directories'
        file:
            path: '{{ config.root }}'
            state: directory
            mode: '0755'

      - name: '{{ app_name | upper }}: Create Proxy Config'
        copy:
            dest: '{{ config.root }}/config.yaml'
            content: |-
                model_list:
                  # ── Local Ollama (direct access) ──
                  - model_name: local
                    litellm_params:
                      model: ollama_chat/llama3.2
                      api_base: "http://127.0.0.1:{{ ollama_port }}"

                  # ── Simple: concise models, high volume ──
                  - model_name: simple
                    litellm_params:
                      model: mistral/mistral-small-latest
                      api_key: "{{ env.JARVIS_AI_MISTRAL_KEY }}"
                  - model_name: simple
                    litellm_params:
                      model: gemini/gemini-flash-lite-latest
                      api_key: "{{ env.JARVIS_AI_GEMINI_KEY }}"
                  - model_name: simple
                    litellm_params:
                      model: groq/llama-3.1-8b-instant
                      api_key: "{{ env.JARVIS_AI_GROQ_KEY }}"
                  - model_name: simple
                    litellm_params:
                      model: ollama_chat/llama3.2
                      api_base: "http://127.0.0.1:{{ ollama_port }}"

                  # ── Medium: capable models, balanced ──
                  - model_name: medium
                    litellm_params:
                      model: groq/openai/gpt-oss-120b
                      api_key: "{{ env.JARVIS_AI_GROQ_KEY }}"
                  - model_name: medium
                    litellm_params:
                      model: cerebras/qwen-3-235b-a22b-instruct-2507
                      api_key: "{{ env.JARVIS_AI_CEREBRAS_KEY }}"
                  - model_name: medium
                    litellm_params:
                      model: mistral/mistral-large-latest
                      api_key: "{{ env.JARVIS_AI_MISTRAL_KEY }}"
                  - model_name: medium
                    litellm_params:
                      model: gemini/gemini-flash-lite-latest
                      api_key: "{{ env.JARVIS_AI_GEMINI_KEY }}"
                  - model_name: medium
                    litellm_params:
                      model: ollama_chat/llama3.2
                      api_base: "http://127.0.0.1:{{ ollama_port }}"

                  # ── Complex: strongest models, reasoning ──
                  - model_name: complex
                    litellm_params:
                      model: sambanova/DeepSeek-V3.1
                      api_key: "{{ env.JARVIS_AI_SAMBANOVA_KEY }}"
                  - model_name: complex
                    litellm_params:
                      model: groq/openai/gpt-oss-120b
                      api_key: "{{ env.JARVIS_AI_GROQ_KEY }}"
                  - model_name: complex
                    litellm_params:
                      model: cerebras/qwen-3-235b-a22b-instruct-2507
                      api_key: "{{ env.JARVIS_AI_CEREBRAS_KEY }}"
                  - model_name: complex
                    litellm_params:
                      model: mistral/mistral-large-latest
                      api_key: "{{ env.JARVIS_AI_MISTRAL_KEY }}"
                  - model_name: complex
                    litellm_params:
                      model: ollama_chat/llama3.2
                      api_base: "http://127.0.0.1:{{ ollama_port }}"

                  # ── Complexity Router ──
                  - model_name: auto
                    litellm_params:
                      model: auto_router/complexity_router
                      complexity_router_config:
                        tiers:
                          SIMPLE: simple
                          MEDIUM: medium
                          COMPLEX: complex
                          REASONING: complex
                      complexity_router_default_model: simple

                router_settings:
                  routing_strategy: "usage-based-routing-v2"
                  enable_pre_call_checks: true
                  allowed_fails: 2
                  retry_after: 60
                  num_retries: 3
                  timeout: 120

                general_settings:
                  master_key: "{{ env.JARVIS_AI_SERVER_KEY }}"
            mode: '0644'
        no_log: true
        register: litellm_config

      - name: '{{ app_name | upper }}: Create docker-compose.yml'
        copy:
            dest: '{{ config.root }}/docker-compose.yml'
            content: |-
                services:
                  {{ app_name }}:
                    container_name: {{ app_name }}
                    image: ghcr.io/berriai/litellm:main-stable
                    network_mode: host
                    restart: unless-stopped
                    command: ["--config", "/app/config.yaml", "--port", "{{ litellm_port }}"]
                    volumes:
                      - ./config.yaml:/app/config.yaml
                    healthcheck:
                      test: ["CMD", "curl", "-f", "http://127.0.0.1:{{ litellm_port }}/health"]
                      interval: 30s
                      timeout: 10s
                      retries: 3
                      start_period: 60s
                    logging:
                      driver: "json-file"
                      options:
                        max-size: "10m"
                        max-file: "3"
            mode: '0644'
        register: litellm_compose

      - name: '{{ app_name | upper }}: Deploy Container'
        command: docker compose up -d
        args:
            chdir: '{{ config.root }}'
        register: litellm_deploy
        changed_when: "'Created' in litellm_deploy.stderr or 'Recreated' in litellm_deploy.stderr"

      - name: '{{ app_name | upper }}: Restart on Config Change'
        command: docker compose restart
        args:
            chdir: '{{ config.root }}'
        when: litellm_config is changed and litellm_deploy is not changed
