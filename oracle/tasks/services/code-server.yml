---
- vars:
      app_name: code-server
      config:
          root: '{{ env.JARVIS_CONFIGS_DIR }}/{{ app_name }}'
  block:
      - name: '{{ app_name | upper }}: Health Check'
        uri:
            url: 'http://127.0.0.1:{{ env.JARVIS_SERVICES["code-server"].port }}'
            timeout: 3
        register: health
        failed_when: false
        changed_when: false

      - name: '{{ app_name | upper }}: Install'
        shell: |
            set -eo pipefail
            curl -fsSL https://code-server.dev/install.sh | sh
        args:
            executable: /bin/bash
        when: (health.status | default(0)) != 200

      - name: '{{ app_name | upper }}: Configure Directories'
        file:
            path: '{{ config.root }}'
            state: directory
            mode: '0755'
            owner: ubuntu
            group: ubuntu

      - name: '{{ app_name | upper }}: Write Config'
        copy:
            dest: '{{ config.root }}/config.yaml'
            content: |-
                bind-addr: 127.0.0.1:{{ env.JARVIS_SERVICES['code-server'].port }}
                auth: none
                cert: false
                user-data-dir: {{ config.root }}/data
                proxy-domain: {{ env.RITIK_DOMAIN }}
            mode: '0644'
            owner: ubuntu
            group: ubuntu
        register: cs_config

      - name: '{{ app_name | upper }}: Create Systemd Override Directory'
        file:
            path: /etc/systemd/system/code-server@ubuntu.service.d
            state: directory
            mode: '0755'

      - name: '{{ app_name | upper }}: Configure Systemd Override'
        copy:
            dest: /etc/systemd/system/code-server@ubuntu.service.d/override.conf
            content: |
                [Service]
                MemoryMax=6G
                RuntimeMaxSec=86400
                ExecStart=
                ExecStart=/usr/bin/code-server --config {{ config.root }}/config.yaml
            mode: '0644'
        register: cs_override

      - name: '{{ app_name | upper }}: Daemon Reload'
        systemd:
            daemon_reload: true
        when: cs_override is changed

      - name: '{{ app_name | upper }}: Enable and Start Service'
        systemd:
            name: 'code-server@ubuntu'
            state: "{{ 'restarted' if (cs_config is changed or cs_override is changed) else 'started' }}"
            enabled: true

      - name: '{{ app_name | upper }}: Install Extensions'
        command: >
            code-server
            --extensions-dir {{ config.root }}/data/extensions
            --user-data-dir {{ config.root }}/data
            {{ extensions | map('regex_replace', '^', '--install-extension ') | join(' ') }}
            --force
        vars:
            extensions:
                - usernamehw.errorlens
                - eamodio.gitlens
                - ms-vscode.vscode-typescript-next
                - biomejs.biome
                - esbenp.prettier-vscode
                - streetsidesoftware.code-spell-checker
                - bradlc.vscode-tailwindcss
                - vira.vsc-vira-theme
                - anthropic.claude-code
                - openai.chatgpt
                - sst-dev.opencode
        become: true
        become_user: ubuntu
        ignore_errors: true

