---
- vars:
      app_name: code-server
  block:
      - name: '{{ app_name | upper }}: Check Installation'
        command: code-server --version
        register: cs_check
        failed_when: false
        changed_when: false

      - name: '{{ app_name | upper }}: Install'
        shell: |
            set -eo pipefail
            curl -fsSL https://code-server.dev/install.sh | sh
        args:
            executable: /bin/bash
        when: cs_check.rc != 0

      - name: '{{ app_name | upper }}: Ensure Config Directory'
        file:
            path: /home/ubuntu/.config/code-server
            state: directory
            mode: '0755'
            owner: ubuntu
            group: ubuntu

      - name: '{{ app_name | upper }}: Configure'
        copy:
            dest: /home/ubuntu/.config/code-server/config.yaml
            content: |-
                bind-addr: 127.0.0.1:{{ env.JARVIS_SERVICES['code-server'].port }}
                auth: none
                cert: false
            mode: '0644'
            owner: ubuntu
            group: ubuntu
        register: cs_config

      - name: '{{ app_name | upper }}: Create Systemd Override Directory'
        file:
            path: /etc/systemd/system/code-server@ubuntu.service.d
            state: directory
            mode: '0755'

      - name: '{{ app_name | upper }}: Configure Memory Limits'
        copy:
            dest: /etc/systemd/system/code-server@ubuntu.service.d/override.conf
            content: |
                [Service]
                MemoryMax=6G
                RuntimeMaxSec=86400
            mode: '0644'
        register: cs_override

      - name: '{{ app_name | upper }}: Daemon Reload'
        systemd:
            daemon_reload: true
        when: cs_override is changed

      - name: '{{ app_name | upper }}: Enable and Start Service'
        systemd:
            name: 'code-server@ubuntu'
            state: "{{ 'restarted' if (cs_config is changed or cs_override is changed) else 'started' }}"
            enabled: true
