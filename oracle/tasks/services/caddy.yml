---
- vars:
      app_name: caddy
      config:
          root: '{{ env.JARVIS_CONFIGS_DIR }}/{{ app_name }}'
  block:
      - name: '{{ app_name | upper }}: Configure Directories'
        file:
            path: '{{ config.root }}/data'
            state: directory
            mode: '0755'

      - name: '{{ app_name | upper }}: Create Caddyfile'
        copy:
            dest: '{{ config.root }}/Caddyfile'
            content: |-
                :80 {
                    @codeserver host code.{{ env.RITIK_DOMAIN }}
                    handle @codeserver {
                        reverse_proxy localhost:{{ env.JARVIS_SERVICES['code-server'].port }}
                    }

                    @cloudcli host vibe.{{ env.RITIK_DOMAIN }}
                    handle @cloudcli {
                        reverse_proxy localhost:{{ env.JARVIS_SERVICES.cloudcli.port }}
                    }

                    @opencode host opencode.{{ env.RITIK_DOMAIN }}
                    handle @opencode {
                        reverse_proxy localhost:{{ env.JARVIS_SERVICES.opencode.port }} {
                            header_up Host localhost
                            header_up -X-Forwarded-Host
                        }
                    }

                    @port_allowed header_regexp portnum Host ^([3-8]\d{3}|9000)\.{{ env.RITIK_DOMAIN | regex_escape }}
                    handle @port_allowed {
                        reverse_proxy localhost:{re.portnum.1}
                    }

                    handle {
                        respond "Forbidden" 403
                    }
                }
            mode: '0644'

      - name: '{{ app_name | upper }}: Create docker-compose.yml'
        copy:
            dest: '{{ config.root }}/docker-compose.yml'
            content: |-
                services:
                  {{ app_name }}:
                    container_name: {{ app_name }}
                    image: caddy:2-alpine
                    network_mode: host
                    restart: unless-stopped
                    volumes:
                      - {{ config.root }}/Caddyfile:/etc/caddy/Caddyfile:ro
                      - {{ config.root }}/data:/data
                    healthcheck:
                      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
                      interval: 30s
                      timeout: 10s
                      retries: 3
                      start_period: 10s
                    logging:
                      driver: "json-file"
                      options:
                        max-size: "10m"
                        max-file: "3"
            mode: '0644'

      - name: '{{ app_name | upper }}: Stop and Remove Container'
        command: docker compose down
        args:
            chdir: '{{ config.root }}'
        failed_when: false
        changed_when: false

      - name: '{{ app_name | upper }}: Deploy Container'
        command: docker compose up -d
        args:
            chdir: '{{ config.root }}'
        changed_when: true
