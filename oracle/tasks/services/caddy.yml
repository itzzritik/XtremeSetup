---
- vars:
      app_name: caddy
      config:
          root: '{{ env.JARVIS_CONFIGS_DIR }}/{{ app_name }}'
  block:
      - name: '{{ app_name | upper }}: Configure Directories'
        file:
            path: '{{ config.root }}'
            state: directory
            mode: '0755'

      - name: '{{ app_name | upper }}: Create Caddyfile'
        copy:
            dest: '{{ config.root }}/Caddyfile'
            content: |-
                :80 {
                    # code-server
                    @codeserver host code.{{ env.JARVIS_DOMAIN }}
                    reverse_proxy @codeserver localhost:{{ env.JARVIS_SERVICES['code-server'].port }}

                    # Coder Mux
                    @mux host ai.code.{{ env.JARVIS_DOMAIN }}
                    reverse_proxy @mux localhost:{{ env.JARVIS_SERVICES.mux.port }}

                    # Wildcard port preview (ALLOWLISTED: 3000-9000 only)
                    @port_allowed {
                        header_regexp portnum Host ^([3-8]\d{3}|9000)\.code\.
                    }
                    reverse_proxy @port_allowed localhost:{re.portnum.1}

                    # Block non-allowlisted port requests
                    @port_blocked {
                        header_regexp Host ^(\d+)\.code\.
                    }
                    respond @port_blocked "Forbidden" 403
                }
            mode: '0644'
        register: caddy_config

      - name: '{{ app_name | upper }}: Create docker-compose.yml'
        copy:
            dest: '{{ config.root }}/docker-compose.yml'
            content: |-
                services:
                  {{ app_name }}:
                    container_name: {{ app_name }}
                    image: caddy:2-alpine
                    network_mode: host
                    restart: unless-stopped
                    volumes:
                      - ./Caddyfile:/etc/caddy/Caddyfile
                      - caddy_data:/data
                      - caddy_config:/config
                    logging:
                      driver: "json-file"
                      options:
                        max-size: "10m"
                        max-file: "3"
                volumes:
                  caddy_data:
                  caddy_config:
            mode: '0644'
        register: caddy_compose

      - name: '{{ app_name | upper }}: Deploy Container'
        command: docker compose up -d
        args:
            chdir: '{{ config.root }}'
        register: caddy_deploy
        changed_when: "'Created' in caddy_deploy.stderr or 'Recreated' in caddy_deploy.stderr"

      - name: '{{ app_name | upper }}: Reload on Config Change'
        command: docker exec caddy caddy reload --config /etc/caddy/Caddyfile
        when: caddy_config is changed and caddy_deploy is not changed
