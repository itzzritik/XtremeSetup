---
- name: Setup Local Environment
  hosts: local
  connection: local
  gather_facts: true
  tasks:
      - name: Install Ansible Requirements
        command: ansible-galaxy collection install -r requirements.yml --upgrade
        args:
            chdir: '{{ playbook_dir }}'
        register: galaxy_install
        changed_when: "'Installing' in galaxy_install.stdout"

      - name: Environment Setup
        include_tasks: tasks/env/index.yml

- name: Configure Oracle Dev Server
  hosts: oracle_machines
  gather_facts: false

  pre_tasks:
      - name: Restore Environment Variables
        set_fact:
            env: '{{ hostvars["local"]["env"] }}'
        no_log: true

      - name: Ensure Base Directories
        file:
            path: '{{ dir }}'
            state: directory
            mode: '0755'
        loop:
            - '{{ env.JARVIS_DIR }}'
            - '{{ env.JARVIS_CONFIGS_DIR }}'
        loop_control:
            loop_var: dir

  tasks:
      - name: Execute System Tasks
        include_tasks: 'tasks/system/{{ task }}.yml'
        loop:
            - update
            - networking
            - sysctl
            - docker
            - tools
            - hardening
        loop_control:
            loop_var: task

      - name: Deploy Services
        include_tasks: 'tasks/services/{{ service }}.yml'
        loop:
            - cloudflared
            - code-server
            - mux
            - devenv
            - caddy
        loop_control:
            loop_var: service
